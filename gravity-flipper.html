// ── Challenge URL parsing ──────────────────────────────────────────────────────
const CHALLENGE=(function(){
  try{
    const raw=new URLSearchParams(window.location.search).get('challenge');
    if(raw){const col=raw.lastIndexOf(':');if(col>0){const name=decodeURIComponent(raw.slice(0,col)).toUpperCase().substring(0,12);const score=parseInt(raw.slice(col+1));if(name&&score>0)return{active:true,name,score};}}

// ── LB / challenge helpers ─────────────────────────────────────────────────────
function makeLbRows(scores,myName){
  if(!scores||!scores.length)return'<div style="color:#333;font-size:9px;padding:10px 0;text-align:center">NO SCORES YET</div>';
  return scores.slice(0,10).map((s,i)=>{
    const isMe=myName&&s.name===myName;
    const rank=i===0?'\u2605':'#'+(i+1);
    return`<div class="lb-row${isMe?' lb-me':''}"><span class="lb-rank">${rank}</span><span class="lb-name">${s.name}</span><span class="lb-score">${s.score}</span></div>`;
  }).join('');
}
function fillLbAsync(containerId,myName){
  FSTORE.top(10).then(fb=>{const el=document.getElementById(containerId);if(el)el.innerHTML=makeLbRows(fb||getScores(),myName);});
}
function makeChallengeUrl(name,score){
  return`${location.href.split('?')[0]}?challenge=${encodeURIComponent(name)}:${score}`;
}
function wireShareBtns(containerId,name,score){
  const cont=document.getElementById(containerId);if(!cont)return;
  const url=makeChallengeUrl(name,score);
  const buildMessage=(shortUrl)=>`\uD83C\uDFC6 GRAVITY FLIPPER CHALLENGE\n${name} scored ${score} points!\nThink you can beat them? \uD83D\uDE0F\nTry now \uD83D\uDC49 ${shortUrl}`;
  const showButtons=(shortUrl)=>{
    const shareText=buildMessage(shortUrl);
    const msg=encodeURIComponent(shareText);
    cont.innerHTML=`
      <div class="ov-sub" style="color:#888;margin:6px 0 4px">SHARE VIA</div>
      <button class="share-btn share-wa" id="${containerId}-wa">\uD83D\uDCAC WHATSAPP</button>
      <button class="share-btn share-gm" id="${containerId}-gm">\uD83D\uDCE7 GMAIL</button>
      <button class="share-btn share-cp" id="${containerId}-cp">\uD83D\uDD17 COPY LINK</button>`;
    addTap(document.getElementById(`${containerId}-wa`),()=>{
      if(navigator.share){
        navigator.share({title:'Gravity Flipper Challenge',text:shareText,url:''}).catch(()=>{});
      } else {
        window.open(`https://wa.me/?text=${msg}`,'_blank');
      }
    });
    addTap(document.getElementById(`${containerId}-gm`),()=>window.open(`mailto:?subject=${encodeURIComponent('Gravity Flipper Challenge!')}&body=${msg}`,'_self'));
    addTap(document.getElementById(`${containerId}-cp`),()=>{
      navigator.clipboard?navigator.clipboard.writeText(shortUrl).catch(()=>prompt('Copy:',shortUrl)):prompt('Copy:',shortUrl);
      const b=document.getElementById(`${containerId}-cp`);
      if(b){b.textContent='\u2713 COPIED!';b.style.borderColor='#00ff88';b.style.color='#00ff88';}
    });
  };
  cont.innerHTML=`<button class="ov-btn ov-btn-sm" id="${containerId}-t" style="border-color:#ff88ff;color:#ff88ff">\u2694 CHALLENGE A FRIEND</button>`;
  addTap(document.getElementById(`${containerId}-t`),()=>{
    cont.innerHTML=`<div class="ov-sub" style="color:#888;margin:8px 0">Preparing challenge\u2026</div>`;
    fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`)
      .then(r=>r.ok?r.text():Promise.reject())
      .then(short=>showButtons(short.trim()))
      .catch(()=>showButtons(url));
  });
}

// ── Leaderboard helpers ───────────────────────────────────────────────────────
function saveScore(score,levelIndex){
  if(!score||score<=0)return;
  const name=(localStorage.getItem('gf_name')||'UNKNOWN').trim().toUpperCase().substring(0,12)||'UNKNOWN';
  const now=new Date();
  const date=`${now.getMonth()+1}/${now.getDate()}`;
  const scores=JSON.parse(localStorage.getItem('gf_scores')||'[]');
  scores.push({name,score,date});
  scores.sort((a,b)=>b.score-a.score);
  localStorage.setItem('gf_scores',JSON.stringify(scores.slice(0,20)));
  FSTORE.save(name,score,levelIndex||0);
}
function getScores(){return JSON.parse(localStorage.getItem('gf_scores')||'[]');}

// ── Audio Manager ─────────────────────────────────────────────────────────────
class AudioMgr{
  constructor(){
    this.ctx=null;this.master=null;this.sfxBus=null;this.musicBus=null;
    this.muted=localStorage.getItem('gf_mute')==='1';
    this._mPlaying=false;this._mTimer=null;this._mNoteIdx=0;this._mNextTime=0;
    this._melody=null;
  }
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain();this.master.gain.value=this.muted?0:1;
    this.master.connect(this.ctx.destination);
    this.sfxBus=this.ctx.createGain();this.sfxBus.gain.value=0.55;this.sfxBus.connect(this.master);
    this.musicBus=this.ctx.createGain();this.musicBus.gain.value=0.13;this.musicBus.connect(this.master);
  }
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();}
  _osc(bus,freq,type,vol,t0,dur){
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(bus);o.start(t0);o.stop(t0+dur+0.01);
  }
  flip(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    // Sub-bass thump for punch
    const o1=this.ctx.createOscillator(),g1=this.ctx.createGain();
    o1.type='square';o1.frequency.setValueAtTime(90,t);o1.frequency.exponentialRampToValueAtTime(42,t+0.07);
    g1.gain.setValueAtTime(0.45,t);g1.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
    o1.connect(g1);g1.connect(this.sfxBus);o1.start(t);o1.stop(t+0.10);
    // Rising frequency sweep — the "whip" sound
    const o2=this.ctx.createOscillator(),g2=this.ctx.createGain();
    o2.type='square';o2.frequency.setValueAtTime(200,t+0.01);o2.frequency.exponentialRampToValueAtTime(720,t+0.13);
    g2.gain.setValueAtTime(0.3,t+0.01);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o2.connect(g2);g2.connect(this.sfxBus);o2.start(t+0.01);o2.stop(t+0.17);
  }
  coin(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    this._osc(this.sfxBus,880,'triangle',0.38,t,0.07);
    this._osc(this.sfxBus,1320,'triangle',0.28,t+0.07,0.14);
  }
  death(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    [440,330,220,110].forEach((f,i)=>this._osc(this.sfxBus,f,'sawtooth',0.32,t+i*0.13,0.2));
  }
  complete(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    [523,659,784,1047].forEach((f,i)=>this._osc(this.sfxBus,f,'square',0.28,t+i*0.1,0.16));
    this._osc(this.sfxBus,1047,'triangle',0.2,t+0.42,0.55);
  }
  failed(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    [440,392,349,262].forEach((f,i)=>this._osc(this.sfxBus,f,'square',0.28,t+i*0.13,0.2));
  }
  countBeep(isGo){
    if(!this.ctx||this.muted)return;this.resume();
    this._osc(this.sfxBus,isGo?1047:523,'square',0.3,this.ctx.currentTime,0.1);
  }
  coinRare(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    this._osc(this.sfxBus,1047,'triangle',0.32,t,0.06);
    this._osc(this.sfxBus,1319,'triangle',0.28,t+0.07,0.08);
    this._osc(this.sfxBus,1568,'triangle',0.24,t+0.15,0.10);
    this._osc(this.sfxBus,2093,'triangle',0.18,t+0.25,0.18);
  }
  shieldGet(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    [392,494,587,784].forEach((f,i)=>this._osc(this.sfxBus,f,'square',0.20,t+i*0.06,0.12));
  }
  shieldHit(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime;
    this._osc(this.sfxBus,220,'sawtooth',0.38,t,0.08);
    this._osc(this.sfxBus,440,'square',0.22,t+0.06,0.14);
  }
  magnetGet(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+0.22);
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
    o.connect(g);g.connect(this.sfxBus);o.start(t);o.stop(t+0.30);
  }
  nearMiss(){
    if(!this.ctx||this.muted)return;this.resume();
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(180,t+0.09);
    g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
    o.connect(g);g.connect(this.sfxBus);o.start(t);o.stop(t+0.12);
  }

  // ── Music ───────────────────────────────────────────────────────────────────
  // 4 melody variants, 2 levels each — chosen from levelIndex
  _getMelody(levelIndex){
    const BPM=138,B=60/BPM;
    // Helper to convert note list [freq,beats] → timed sequence
    const seq=(notes)=>notes.map(([f,b])=>[f,b*B]);
    const melodies=[
      // Variant 0: C major, light adventure (levels 1-2)
      seq([
        [659,0.5],[587,0.25],[523,0.25],[659,0.5],[784,0.5],
        [880,0.75],[784,0.25],[659,1.0],
        [784,0.5],[659,0.5],[523,0.5],[659,0.5],
        [587,0.75],[523,0.25],[523,1.0],
        [698,0.5],[880,0.5],[1047,0.5],[880,0.5],
        [784,0.5],[659,0.5],[698,1.0],
        [523,0.5],[659,0.5],[784,0.5],[1047,0.5],
        [880,0.75],[784,0.25],[523,1.0],
      ]),
      // Variant 1: F major, upbeat journey (levels 3-4)
      seq([
        [698,0.5],[784,0.25],[880,0.25],[1047,0.5],[880,0.5],
        [784,0.75],[698,0.25],[698,1.0],
        [523,0.5],[659,0.5],[784,0.5],[698,0.5],
        [880,0.75],[784,0.25],[523,1.0],
        [1047,0.5],[880,0.5],[784,0.5],[698,0.5],
        [659,0.5],[698,0.5],[784,0.5],[0,0.5],
        [880,0.5],[784,0.5],[698,0.5],[587,0.5],
        [523,1.5],[0,0.5],
      ]),
      // Variant 2: D minor, building tension (levels 5-6)
      seq([
        [587,0.5],[698,0.5],[784,0.5],[587,0.5],
        [880,0.75],[784,0.25],[698,1.0],
        [659,0.5],[587,0.5],[523,0.5],[587,0.5],
        [698,0.75],[587,0.25],[587,1.0],
        [440,0.5],[523,0.5],[587,0.5],[698,0.5],
        [784,0.5],[698,0.5],[587,0.5],[0,0.5],
        [523,0.5],[587,0.5],[659,0.5],[784,0.5],
        [587,1.5],[0,0.5],
      ]),
      // Variant 3: A minor, dramatic climax (levels 7-8)
      seq([
        [880,0.5],[784,0.5],[698,0.5],[659,0.5],
        [784,0.5],[880,0.5],[1047,1.0],
        [880,0.5],[784,0.5],[698,0.5],[523,0.5],
        [587,0.75],[0,0.25],[0,1.0],
        [880,0.5],[1047,0.5],[1175,0.5],[1047,0.5],
        [880,0.5],[784,0.5],[698,0.5],[0,0.5],
        [659,0.5],[698,0.5],[784,0.5],[880,0.5],
        [784,1.5],[0,0.5],
      ]),
    ];
    return melodies[Math.floor(levelIndex/2)%melodies.length];
  }

  startMusic(levelIndex=0){
    if(!this.ctx||this._mPlaying)return;
    this._mPlaying=true;this._mNoteIdx=0;
    this._melody=this._getMelody(levelIndex);
    this._mNextTime=this.ctx.currentTime+0.1;
    this._musicLoop();
  }
  stopMusic(){
    this._mPlaying=false;
    if(this._mTimer)clearTimeout(this._mTimer);
  }
  pauseMusic(){
    if(this._mTimer)clearTimeout(this._mTimer);
    this._mTimer=null;
    if(this.ctx&&this.ctx.state==='running')this.ctx.suspend();
  }
  resumeMusic(){
    if(this.ctx&&this.ctx.state==='suspended')
      this.ctx.resume().then(()=>{if(this._mPlaying)this._musicLoop();});
  }
  _musicLoop(){
    if(!this._mPlaying)return;
    while(this._mNextTime<this.ctx.currentTime+0.28)this._schedNote();
    this._mTimer=setTimeout(()=>this._musicLoop(),80);
  }
  _schedNote(){
    const[freq,dur]=this._melody[this._mNoteIdx%this._melody.length];
    if(freq>0&&!this.muted){
      const t=this._mNextTime,noteLen=dur*0.78;
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='square';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(1,t+0.005);
      g.gain.setValueAtTime(1,t+noteLen*0.55);g.gain.linearRampToValueAtTime(0,t+noteLen);
      o.connect(g);g.connect(this.musicBus);o.start(t);o.stop(t+noteLen+0.01);
    }
    this._mNextTime+=dur;this._mNoteIdx++;
  }
  toggleMute(){
    this.muted=!this.muted;
    localStorage.setItem('gf_mute',this.muted?'1':'0');
    if(this.master)this.master.gain.setTargetAtTime(this.muted?0:1,this.ctx.currentTime,0.04);
    return this.muted;
  }
}

// ── INPUT singleton — canvas-level touchend + click, bypasses Phaser entirely ─
// iOS Safari is most reliable with touchend on the canvas element itself.
const INPUT=(function(){
  let _cv=null, _handlers=[], _dot=null;

  function _toGame(cx,cy){
    const r=_cv.getBoundingClientRect();
    return{x:((cx-r.left)/r.width)*W, y:((cy-r.top)/r.height)*H};
  }
  function _dot_show(cx,cy){
    if(!_dot){
      _dot=document.createElement('div');
      _dot.style.cssText='position:fixed;width:26px;height:26px;border-radius:50%;background:rgba(255,255,0,0.85);border:2px solid #fff;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:opacity 0.35s;opacity:0';
      document.body.appendChild(_dot);
    }
    _dot.style.left=cx+'px'; _dot.style.top=cy+'px'; _dot.style.opacity='1';
    clearTimeout(_dot._t); _dot._t=setTimeout(()=>{_dot.style.opacity='0';},350);
  }
  function _fire(pos){
    const snap=[..._handlers];
    _handlers=_handlers.filter(h=>!h.once);
    snap.forEach(h=>h.fn(pos));
  }
  function _onTouchEnd(e){
    e.preventDefault(); e.stopPropagation();
    const t=e.changedTouches[0];
    _dot_show(t.clientX,t.clientY);
    _fire(_toGame(t.clientX,t.clientY));
  }
  function _onClick(e){
    _dot_show(e.clientX,e.clientY);
    _fire(_toGame(e.clientX,e.clientY));
  }
  return{
    init(canvas){
      _cv=canvas;
      canvas.addEventListener('touchend',_onTouchEnd,{passive:false});
      canvas.addEventListener('mousedown',_onClick); // desktop: faster than click
    },
    on(fn){_handlers.push({fn,once:false});},
    once(fn){_handlers.push({fn,once:true});},
    off(fn){_handlers=_handlers.filter(h=>h.fn!==fn);},
    clear(){_handlers=[];}
  };
})();

// ── OV — HTML overlay manager ─────────────────────────────────────────────────
// Overlays are real DOM elements layered above the canvas; they receive all
// pointer/touch events natively, bypassing Phaser entirely.
const OV={
  _el:null,
  show(id,html,bg){
    this.hide();
    const d=document.createElement('div');
    d.id=id; d.className='ov';
    d.style.background=bg||'rgba(0,0,8,0.88)';
    d.innerHTML=html;
    document.body.appendChild(d);
    this._el=d; return d;
  },
  hide(){if(this._el){this._el.remove();this._el=null;}}
};

// addTap — attach touchend+click to an element with double-fire guard.
// touchend fires first; preventDefault() stops the 300ms synthetic click on iOS.
function addTap(el,fn){
  if(!el)return;
  let last=0;
  const go=(e)=>{
    e.preventDefault(); e.stopPropagation();
    const n=Date.now(); if(n-last<600)return; last=n; fn();
  };
  el.addEventListener('touchend',go,{passive:false});
  el.addEventListener('click',go);
}

        <div class="ov-sub" style="color:#888">&#9660; TRACK</div>
        <div class="tr-grid">${trackHTML}</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#ffff00">BEST: ${best} PTS</div>
        <div class="ov-sub" style="color:#888">REACHED LEVEL ${reach}</div>
        <button class="ov-btn${nameValid?'':' ov-btn-disabled'}" id="ov-start" style="margin-top:10px;border-color:${nameValid?'#00ffff':'#444'};color:${nameValid?'#00ffff':'#444'}">&#9654; PLAY</button>
        <button class="ov-btn ov-btn-sm" id="ov-hof" style="border-color:#ffdd00;color:#ffdd00;margin-top:4px">&#9733; HALL OF FAME</button>
        <div class="ov-sub" style="color:#444;margin-top:4px">TAP = FLIP GRAVITY</div>
      </div>`,'rgba(0,0,10,0.96)');
    CHARACTERS.forEach((_,i)=>addTap(document.getElementById('ch'+i),()=>this._pickChar(i)));

      }

      localStorage.setItem('gf_track',TRACKS[this._trackIdx].id);
      localStorage.setItem('gf_name',nameVal);
      this.scene.start('Game',{levelIndex:0,totalScore:0});
    };
    addTap(document.getElementById('ov-start'),go);
    addTap(document.getElementById('ov-hof'),()=>{OV.hide();this.scene.start('Leaderboard');});
    const nameInp=document.getElementById('gf-name-inp');
    if(nameInp)nameInp.addEventListener('input',()=>{
      const ok=nameInp.value.replace(/\s/g,'').length>=2;
      const btn=document.getElementById('ov-start');if(!btn)return;
      btn.className='ov-btn'+(ok?'':' ov-btn-disabled');
      btn.style.borderColor=ok?'#00ffff':'#444';btn.style.color=ok?'#00ffff':'#444';
    });
    if(this.input.keyboard)this.input.keyboard.once('keydown-ENTER',go);
  }
  _pickChar(i){
    this._charIdx=i;
    CHARACTERS.forEach((ch,j)=>{
      const b=document.getElementById('ch'+j);if(!b)return;
      const sel=j===i,col='#'+ch.col.toString(16).padStart(6,'0');
      b.className='ch-btn'+(sel?' sel':'');
      b.style.borderColor=sel?col:'#334455';
    });
  }
  _pickTrack(i){
    this._trackIdx=i;
    TRACKS.forEach((tr,j)=>{
      const b=document.getElementById('tr'+j);if(!b)return;
      const sel=j===i;
      b.className='tr-btn'+(sel?' sel':'');
      b.style.borderColor=sel?tr.previewGrad[0]:'#334455';
    });
  }
}

class GameScene extends Phaser.Scene{
  constructor(){super('Game');}
  init(d){this.levelIndex=d.levelIndex||0; this.totalScore=d.totalScore||0; this._paused=false;}

  create(){
    this.lvl=getLevel(this.levelIndex);
    this.theme=getLevelTrack(this.levelIndex);
    this.cameras.main.setBackgroundColor(this.theme.bg);
    AUDIO.init(); AUDIO.resume();

    this.speed=this.lvl.startSpeed; this.gravDir=1; this.vy=0;
    this.alive=true; this.gameStarted=false; this.levelDone=false;
    this.distTraveled=0; this.flipCooldown=0;
    this.coinsCollected=0; this.levelScore=0; this.cameraShake=0;
    this.nextObstacleWorldX=380; this.safetyCoinsSpawned=false; this.trailTimer=0;
    this._nearMissObstacles=new Set(); this._closeCallCooldown=0;
    this._inputBuf=0; this._ambientT=0; this._shockwave=null;
    this._challengeBeat=false;
    this.laserList=[];
    this._levelPowerup=Math.random()<0.5?'shield':'magnet';
    this.hasShield=false; this.magnetTimer=0; this.powerupType=null; this.powerupMax=0;

    this.obstacles=this.add.group();
    this.coins=this.add.group();
    this.particles=this.add.group();
    this.stars=this.add.group();

    this._buildStars(); this._buildWallGfx(); this._buildPlayer();
    this._buildUI(); this._buildFinishLine(); this._buildInputs();
    this._showIntro();
    AUDIO.startMusic(this.levelIndex);
  }

  _buildStars(){
    for(let i=0;i<60;i++){
      const s=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(TUNNEL_TOP+4,TUNNEL_BOTTOM-4),'star')
        .setAlpha(Math.random()*0.4+0.1).setDepth(0);
      s.scrollX=Math.random()*0.3+0.05; this.stars.add(s);
    }
  }

  _buildWallGfx(){this.wallGfx=this.add.graphics().setDepth(5); this._drawWalls(0,0);}
  _drawWalls(off,time){
    const g=this.wallGfx,t=this.theme; g.clear();
    g.fillStyle(t.wallFill); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    switch(t.style){
      case 'lava':  this._wLava(g,t,off,time);  break;
      case 'ice':   this._wIce(g,t,off,time);   break;
      case 'cyber': this._wCyber(g,t,off,time); break;
      case 'void':  this._wVoid(g,t,off,time);  break;
      default:      this._wNeon(g,t,off,time);  break;
    }
    // Always: bright tunnel border + inner glow
    g.lineStyle(3,t.wallLine,1);
    g.beginPath();g.moveTo(0,TUNNEL_TOP);g.lineTo(W,TUNNEL_TOP);g.strokePath();
    g.beginPath();g.moveTo(0,TUNNEL_BOTTOM);g.lineTo(W,TUNNEL_BOTTOM);g.strokePath();
    g.lineStyle(14,t.wallGlow,0.35);
    g.beginPath();g.moveTo(0,TUNNEL_TOP);g.lineTo(W,TUNNEL_TOP);g.strokePath();
    g.beginPath();g.moveTo(0,TUNNEL_BOTTOM);g.lineTo(W,TUNNEL_BOTTOM);g.strokePath();
  }

  // ── NEON CITY: cyan grid + city building silhouettes ──────────────────────
  _wNeon(g,t,off,time){
    g.lineStyle(1,t.wallLine,0.14);
    for(let x=-(off%40);x<W;x+=40){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    for(let y=0;y<TUNNEL_TOP;y+=20){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();}
    for(let y=TUNNEL_BOTTOM;y<H;y+=20){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();}
    // Building skyline — deterministic height from world column index
    const BW=64;
    for(let i=-1;i<=Math.ceil(W/BW)+1;i++){
      const wi=((Math.floor(off/BW)+i)&0x7f);
      const bx=i*BW-(off%BW);
      const bh=16+(wi*2371+wi*wi*13)%5*9;
      g.fillStyle(0x1a0044,1); g.fillRect(bx+1,TUNNEL_TOP-bh,BW-2,bh);
      const bh2=10+(wi*1847+wi*wi*7)%4*8;
      g.fillRect(bx+1,TUNNEL_BOTTOM,BW-2,bh2);
    }
    g.fillStyle(t.wallLine,0.07+Math.sin(time*0.0015)*0.03);
    g.fillRect(0,TUNNEL_TOP-10,W,10); g.fillRect(0,TUNNEL_BOTTOM,W,10);
  }

  // ── LAVA CAVE: rocky cracks + animated drips ──────────────────────────────
  _wLava(g,t,off,time){
    g.fillStyle(0x2a0600,1); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    g.lineStyle(1,0xff4400,0.22);
    for(let x=-(off%55);x<W;x+=55){
      const jag=Math.sin(x*0.09)*7;
      g.beginPath();g.moveTo(x,0);g.lineTo(x+jag,TUNNEL_TOP/2);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x+4,TUNNEL_BOTTOM);g.lineTo(x+jag-4,TUNNEL_BOTTOM+(H-TUNNEL_BOTTOM)/2);g.lineTo(x+4,H);g.strokePath();
    }
    // Animated lava drips hanging from top, bubbling from bottom
    g.lineStyle(0);
    for(let x=4;x<W;x+=20){
      const dh=5+Math.sin(time*0.0014+x*0.11+off*0.008)*4;
      g.fillStyle(0xff5500,0.75); g.fillRect(x,TUNNEL_TOP,4,dh);
      g.fillStyle(0xff8800,0.5);  g.fillRect(x+1,TUNNEL_TOP,2,dh-1);
    }
    for(let x=12;x<W;x+=20){
      const dh=4+Math.sin(time*0.0017+x*0.09+off*0.007)*3;
      g.fillStyle(0xff4400,0.6); g.fillRect(x,TUNNEL_BOTTOM-dh,4,dh);
    }
    g.fillStyle(0xff6600,0.08+Math.sin(time*0.003)*0.04);
    g.fillRect(0,TUNNEL_TOP-14,W,14); g.fillRect(0,TUNNEL_BOTTOM,W,14);
  }

  // ── ICE TUNNEL: crystal facets + icicles ─────────────────────────────────
  _wIce(g,t,off,time){
    g.lineStyle(1,0x88ccff,0.18);
    for(let x=-(off%36);x<W+36;x+=36){
      g.beginPath();g.moveTo(x,0);g.lineTo(x+20,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x-20,H);g.strokePath();
    }
    g.lineStyle(1,0xaaddff,0.10);
    for(let x=-(off%48)+24;x<W+48;x+=48){
      g.beginPath();g.moveTo(x,0);g.lineTo(x-20,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x+20,H);g.strokePath();
    }
    // Frost bands
    g.fillStyle(0xaaddff,0.04);
    for(let y=0;y<TUNNEL_TOP;y+=14){g.fillRect(0,y,W,7);}
    for(let y=TUNNEL_BOTTOM;y<H;y+=14){g.fillRect(0,y,W,7);}
    // Icicles hanging from top + pointing up from bottom
    g.lineStyle(0);
    for(let x=4;x<W;x+=18){
      const ih=4+Math.sin(x*0.066)*3;
      g.fillStyle(0xbbeeFF,0.65); g.fillTriangle(x,TUNNEL_TOP,x+4,TUNNEL_TOP,x+2,TUNNEL_TOP+ih);
      const ih2=3+Math.sin(x*0.071+1.3)*2;
      g.fillTriangle(x+9,TUNNEL_BOTTOM,x+13,TUNNEL_BOTTOM,x+11,TUNNEL_BOTTOM-ih2);
    }
    g.fillStyle(0xffffff,0.05+Math.sin(time*0.0022)*0.03);
    g.fillRect(0,TUNNEL_TOP-8,W,8); g.fillRect(0,TUNNEL_BOTTOM,W,8);
  }

  // ── CYBER GRID: matrix rain columns ──────────────────────────────────────
  _wCyber(g,t,off,time){
    g.lineStyle(1,0x003800,0.55);
    for(let x=-(off%18);x<W;x+=18){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    const t1=time*0.0028;
    for(let col=0;col<=Math.ceil(W/18);col++){
      const cx=col*18-(off%18);
      const ry=((t1*70+col*53)%TUNNEL_TOP+TUNNEL_TOP)%TUNNEL_TOP;
      g.fillStyle(0x00ff44,0.75); g.fillRect(cx,ry,3,4);
      g.fillStyle(0x00ff44,0.22); g.fillRect(cx,(ry-6+TUNNEL_TOP)%TUNNEL_TOP,3,3);
      const ry2=TUNNEL_BOTTOM+((t1*55+col*41)%(H-TUNNEL_BOTTOM));
      if(ry2<H){g.fillStyle(0x00ff44,0.65); g.fillRect(cx,ry2,3,4);}
    }
    g.fillStyle(0x00ff44,0.09+Math.sin(time*0.009)*0.05);
    g.fillRect(0,TUNNEL_TOP-5,W,5); g.fillRect(0,TUNNEL_BOTTOM,W,5);
  }

  // ── SPACE VOID: nebula haze + metallic grid + twinkling wall stars ────────
  _wVoid(g,t,off,time){
    g.lineStyle(1,0x444466,0.22);
    for(let x=-(off%32);x<W;x+=32){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    const nbA=0.05+Math.sin(time*0.0014)*0.025;
    g.lineStyle(0);
    g.fillStyle(0x8844cc,nbA);
    for(let y=0;y<TUNNEL_TOP;y+=10){const w2=W*0.55+Math.sin(y*0.22+off*0.003)*38;g.fillRect((W-w2)/2,y,w2,5);}
    g.fillStyle(0x4488ff,nbA*0.75);
    for(let y=TUNNEL_BOTTOM;y<H;y+=10){const w2=W*0.45+Math.sin(y*0.19+off*0.0028)*32;g.fillRect((W-w2)/2,y,w2,5);}
    // Twinkling wall stars
    const seed=Math.floor(off/64);
    for(let i=0;i<9;i++){
      const sx2=((i*137+seed*31)%W+W)%W;
      const syT=2+((i*89+seed*17)%(TUNNEL_TOP-4));
      const syB=TUNNEL_BOTTOM+2+((i*71+seed*23)%(H-TUNNEL_BOTTOM-4));
      const blink=0.35+0.5*Math.sin(time*0.002+i*1.7);
      g.fillStyle(0xaaaacc,blink); g.fillRect(sx2,syT,2,2); g.fillRect(sx2,syB,2,2);
    }
    g.fillStyle(0x8888cc,0.06+Math.sin(time*0.002)*0.03);
    g.fillRect(0,TUNNEL_TOP-8,W,8); g.fillRect(0,TUNNEL_BOTTOM,W,8);
  }

  _buildPlayer(){
    const charId=localStorage.getItem('gf_char')||'ship';
    const texKey=this.textures.exists('char_'+charId)?'char_'+charId:'char_ship';
    this.player=this.add.image(PLAYER_X,H/2,texKey).setScale(2).setDepth(10);
    this.flipGfx=this.add.graphics().setDepth(12);
    this.shieldAura=this.add.graphics().setDepth(11);
    this.trail=[];
    for(let i=0;i<6;i++) this.trail.push(this.add.image(PLAYER_X,H/2,texKey).setScale(2).setAlpha(0.09*(6-i)).setDepth(9));
    this.trailHist=Array(6).fill({x:PLAYER_X,y:H/2});
  }

  _buildFinishLine(){
    this.finishGfx=this.add.graphics().setDepth(8);
    this.finishTxt=this.add.text(0,TUNNEL_TOP-22,'FINISH',{fontFamily:'"Press Start 2P"',fontSize:'11px',color:'#ffff00'}).setOrigin(0.5,1).setDepth(9);
    this.finishPulse=0;
    this.unlockedMsg=this.add.text(W/2,H/2-60,'FINISH LINE UNLOCKED!',{fontFamily:'"Press Start 2P"',fontSize:'12px',color:'#00ff88',shadow:{x:2,y:2,color:'#005522',blur:0,fill:true}}).setOrigin(0.5).setDepth(25).setAlpha(0);
  }

  _buildUI(){
    const best=parseInt(localStorage.getItem('gf_best')||'0');
    // Shift score/best inward to clear corner button zones
    this.scoreTxt=this.add.text(32,10,'0',{fontFamily:'"Press Start 2P"',fontSize:'13px',color:'#00ffff'}).setDepth(20);
    this.bestTxt=this.add.text(W-32,10,`BEST ${best}`,{fontFamily:'"Press Start 2P"',fontSize:'11px',color:'#ffff00'}).setOrigin(1,0).setDepth(20);
    this.levelTxt=this.add.text(W/2,10,`LVL ${this.levelIndex+1} \u2022 ${this.theme.name}`,{fontFamily:'"Press Start 2P"',fontSize:'9px',color:'#ff88ff'}).setOrigin(0.5,0).setDepth(20);
    const pname=localStorage.getItem('gf_name')||'';
    if(pname)this.add.text(W/2,H-10,pname,{fontFamily:'"Press Start 2P"',fontSize:'7px',color:'#333'}).setOrigin(0.5,1).setDepth(20);
    this.coinTxt=this.add.text(10,30,`\u25c6 0/${this.lvl.required}`,{fontFamily:'"Press Start 2P"',fontSize:'14px',color:'#ffdd00'}).setDepth(20);
    this.progGfx=this.add.graphics().setDepth(20);
    this.powerupGfx=this.add.graphics().setDepth(20);
    this.powerupTxt=this.add.text(10,52,'',{fontFamily:'"Press Start 2P"',fontSize:'8px',color:'#00ff88'}).setDepth(20);
    // Mute — bottom-right (Phaser text, stays on canvas)
    this.muteBtn=this.add.text(W-12,H-12,AUDIO.muted?'[M]':'[S]',{fontFamily:'"Press Start 2P"',fontSize:'9px',color:AUDIO.muted?'#555555':'#00ffcc'}).setOrigin(1,1).setDepth(21).setInteractive();
    this.muteBtn.on('pointerdown',()=>{const m=AUDIO.toggleMute();this.muteBtn.setText(m?'[M]':'[S]').setColor(m?'#555555':'#00ffcc');});
    // HTML pause button — show layer, wire tap
    const _layer=document.getElementById('game-btn-layer');
    const _pbtn=document.getElementById('btn-pause');
    if(_layer){_layer.style.display='flex';}
    if(_pbtn){_pbtn.style.display='flex';addTap(_pbtn,()=>this._pause());}
    this.events.on('shutdown',()=>{
      const l=document.getElementById('game-btn-layer');if(l)l.style.display='none';
    });
    // Challenge HUD
    if(CHALLENGE.active){
      this.challengeTxt=this.add.text(W/2,28,`\u2694 ${CHALLENGE.name}: ${CHALLENGE.score}`,
        {fontFamily:'"Press Start 2P"',fontSize:'7px',color:'#ff88ff'}).setOrigin(0.5,0).setDepth(20);
    }
  }

  _buildInputs(){
    INPUT.on((pos)=>{
      if(pos.x>W-44&&pos.y>H-44)return;  // mute (bottom-right)
      if(this._paused)return;
      this._flip();
    });
    this.events.once('shutdown',()=>INPUT.clear());
    if(this.input.keyboard){
      this.input.keyboard.on('keydown-SPACE',this._flip,this);
      this.input.keyboard.on('keydown-UP',this._flip,this);
      this.input.keyboard.on('keydown-M',()=>{const m=AUDIO.toggleMute();this.muteBtn.setText(m?'[M]':'[S]').setColor(m?'#555555':'#00ffcc');});
      this.input.keyboard.on('keydown-P',()=>{this._paused?this._resume():this._pause();});
      this.input.keyboard.on('keydown-ESC',()=>{this._paused?this._resume():this._pause();});
    }
  }

  // ── Pause ──────────────────────────────────────────────────────────────────
  _pause(){
    if(this._paused||!this.alive||!this.gameStarted)return;
    this._paused=true;
    const pb=document.getElementById('btn-pause');if(pb)pb.style.display='none';
    AUDIO.pauseMusic();
    OV.show('ov-pause',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#00ffff">\u23f8 PAUSED</div>
        <hr class="ov-rule">
        <button class="ov-btn" id="ov-resume" style="margin-top:10px;border-color:#00ff88;color:#00ff88">\u25b6 RESUME</button>
        <button class="ov-btn ov-btn-sm" id="ov-pause-home" style="margin-top:4px">\u2190 MAIN MENU</button>
      </div>`,'rgba(0,0,8,0.92)');
    this.time.delayedCall(300,()=>{
      addTap(document.getElementById('ov-resume'),()=>this._resume());
      addTap(document.getElementById('ov-pause-home'),()=>{OV.hide();AUDIO.stopMusic();this._paused=false;this.scene.start('Menu');});
    });
  }
  _resume(){
    if(!this._paused)return;
    this._paused=false;
    OV.hide();
    const pb=document.getElementById('btn-pause');if(pb)pb.style.display='flex';
    AUDIO.resumeMusic();
  }

  // ── Level intro + countdown (HTML overlay) ─────────────────────────────────
  _showIntro(){
    const t=this.theme, l=this.lvl;
    OV.show('ov-intro',
      `<div class="ov-wrap">
        <div class="ov-sub" style="color:#888">LEVEL</div>
        <div class="ov-title" style="color:#ffff00;text-shadow:4px 4px #886600;font-size:clamp(44px,14vw,64px)">${this.levelIndex+1}</div>
        <div class="ov-sub" style="color:#ff88ff">${t.name}</div>
        <div class="ov-sub" style="color:#00ffff;margin:10px 0">${l.hint}</div>
        <div class="ov-sub" style="color:#ffdd00">COLLECT ${l.required} COINS TO FINISH</div>
        <button class="ov-btn" id="ov-play" style="margin-top:22px;border-color:#ffff00;color:#ffff00">\u25b6 TAP TO START</button>
        <button class="ov-btn ov-btn-sm" id="ov-intro-home" style="margin-top:4px">\u2190 MAIN MENU</button>
      </div>`,'rgba(0,0,8,0.86)');
    let started=false;
    const go=()=>{if(started)return;started=true;OV.hide();this._runCountdown();};
    const goHome=()=>{if(started)return;started=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
    addTap(document.getElementById('ov-play'),go);
    addTap(document.getElementById('ov-intro-home'),goHome);
    if(this.input.keyboard)this.input.keyboard.once('keydown',go);
    this.time.delayedCall(4000,go);
  }

  _runCountdown(){
    // Brief theme-colored wipe so each world transition feels distinct
    const wl=this.theme.wallLine;
    this.cameras.main.flash(320,(wl>>16)&0xff,(wl>>8)&0xff,wl&0xff,false);
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;';
    const num=document.createElement('div');
    num.style.cssText='font-family:"Press Start 2P",monospace;font-size:clamp(80px,26vw,120px);color:#fff;text-align:center;will-change:transform,opacity;';
    wrap.appendChild(num); document.body.appendChild(wrap);
    const steps=['3','2','1','GO!'], cols=['#ffffff','#ffffff','#ffffff','#00ff88'];
    let idx=0;
    const tick=()=>{
      if(idx>=steps.length){wrap.remove();this.gameStarted=true;return;}
      const isGo=idx===3;
      AUDIO.countBeep(isGo);
      num.textContent=steps[idx];
      num.style.color=cols[idx];
      num.style.fontSize=isGo?'clamp(58px,18vw,86px)':'clamp(80px,26vw,120px)';
      num.style.opacity='1'; num.style.transform='scale(1.5)';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{num.style.transition='transform 0.18s ease-out';num.style.transform='scale(1)';}));
      setTimeout(()=>{num.style.opacity='0';setTimeout(()=>{num.style.transition='';idx++;tick();},200);},isGo?400:550);
    };
    tick();
  }

  // ── Gravity flip ───────────────────────────────────────────────────────────
  _flip(){
    if(!this.alive||!this.gameStarted||this._paused) return;
    if(this.flipCooldown>0){this._inputBuf=INPUT_BUFFER;return;} // queue for later
    this._doFlip();
  }
  _doFlip(){
    this._inputBuf=0;
    this.flipCooldown=0.12;
    this.gravDir*=-1;
    // Gentle push — preserves much of existing momentum, feels floaty
    this.vy=lerp(this.vy,this.gravDir*-FLIP_KICK,0.52);
    this.cameras.main.flash(45,20,60,160,false);
    // Expanding shockwave ring + directional arrow
    this._shockwave={r:4,maxR:58,color:this.theme.wallLine,x:this.player.x,y:this.player.y,dir:this.gravDir};
    // Squash & stretch: squeeze horizontal, elongate vertical in flip direction
    this.tweens.killTweensOf(this.player);
    this.player.setScale(2);
    this.tweens.add({targets:this.player,scaleX:1.0,scaleY:3.4,duration:72,yoyo:true,ease:'Sine.easeInOut'});
    // Directional particle burst — mostly in new gravity direction
    this._emitParticles(this.player.x,this.player.y,[0x00ffff,0xff44ff,0xffffff,0xffff00,0x44ffff],14,50,160);
    for(let i=0;i<8;i++){
      let p=this._poolParticle();
      if(!p){p=this.add.image(0,0,'particle').setDepth(15);this.particles.add(p);}
      p.setActive(true).setVisible(true);
      p.x=this.player.x;p.y=this.player.y;
      p.vx=(Math.random()-0.5)*38;
      p.vy=this.gravDir<0?-Phaser.Math.Between(80,200):-Phaser.Math.Between(-200,-80);
      p.life=0.58;p.setTint(this.theme.wallLine);p.setScale(2);
    }
    this.cameraShake=0.05;
    AUDIO.flip();
  }

  _emitParticles(px,py,colors,count,sMin=60,sMax=160){
    for(let i=0;i<count;i++){
      let p=this._poolParticle();
      if(!p){p=this.add.image(0,0,'particle').setDepth(15);this.particles.add(p);}
      p.setActive(true).setVisible(true);
      p.x=px;p.y=py;
      const a=(i/count)*Math.PI*2,s=Phaser.Math.Between(sMin,sMax);
      p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;
      p.life=1.0;p.setTint(colors[i%colors.length]);p.setScale(Phaser.Math.Between(1,3));
    }
  }
  _poolParticle(){for(const p of this.particles.getChildren())if(!p.active)return p;return null;}

  // ── Theme-specific ambient atmosphere particles ─────────────────────────
  _themeAmbient(dt,time){
    if(!this.gameStarted) return;
    this._ambientT+=dt;
    const style=this.theme.style;
    if(style==='lava'&&this._ambientT>0.22){
      this._ambientT=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(10,W-10);p.y=TUNNEL_BOTTOM-2;p.vx=(Math.random()-0.5)*16;p.vy=-Phaser.Math.Between(20,60);p.life=1.0;p.setTint(Math.random()<0.6?0xff8800:0xff4400);p.setScale(Phaser.Math.Between(1,2));}
    } else if(style==='ice'&&this._ambientT>0.3){
      this._ambientT=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(10,W-10);p.y=TUNNEL_TOP+2;p.vx=(Math.random()-0.5)*10;p.vy=Phaser.Math.Between(14,38);p.life=1.3;p.setTint(0xaaddff);p.setScale(1);}
    } else if(style==='neon'&&this._ambientT>0.45){
      this._ambientT=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(0,W);p.y=Math.random()<0.5?Phaser.Math.Between(0,TUNNEL_TOP):Phaser.Math.Between(TUNNEL_BOTTOM,H);p.vx=(Math.random()-0.5)*18;p.vy=(Math.random()-0.5)*18;p.life=0.7;p.setTint(Math.random()<0.5?0x00ccff:0xaa44ff);p.setScale(1);}
    }
  }

  // ── Obstacle spawning ───────────────────────────────────────────────────────
  _w2s(wx){return PLAYER_X+(wx-this.distTraveled);}
  _spawnCluster(wx){
    const types=this.lvl.types, pick=types[Math.floor(Math.random()*types.length)], sx=this._w2s(wx);
    if(pick==='barrier')this._doBarrier(sx,wx);
    else if(pick==='spike')this._doSpikes(sx,wx);
    else if(pick==='moving')this._doMoving(sx,wx);
    else if(pick==='laser')this._doLaser(sx,wx);
    else if(pick==='gauntlet'){this._doSpikes(sx,wx);this._doBarrier(sx+90,wx+90);}
  }

  _doBarrier(sx,wx){
    const gapH=this.lvl.gap, gapY=Phaser.Math.Between(TUNNEL_TOP+24,TUNNEL_BOTTOM-gapH-24), bh=24;
    for(let y=TUNNEL_TOP;y<gapY;y+=bh){
      const b=this.add.image(sx,y+bh/2,'block').setDepth(6).setTint(this.theme.blockTint);
      b.obstacleType='barrier';this.obstacles.add(b);
    }
    for(let y=gapY+gapH;y<TUNNEL_BOTTOM;y+=bh){
      const b=this.add.image(sx,y+bh/2,'block').setDepth(6).setTint(this.theme.blockTint);
      b.obstacleType='barrier';this.obstacles.add(b);
    }
    this._placeCoin(sx-40,gapY+gapH/2,wx-40);
  }

  _doSpikes(sx,wx){
    const maxTop=clamp(1+Math.floor(this.levelIndex*0.6),1,4);
    const numTop=Phaser.Math.Between(1,maxTop);
    const addBot=this.levelIndex>=2&&Math.random()<0.5;
    const numBot=addBot?Phaser.Math.Between(1,clamp(1+Math.floor(this.levelIndex*0.35),1,3)):0;
    const sp=18;
    for(let i=0;i<numTop;i++){
      const s=this.add.image(sx+i*sp,TUNNEL_TOP+6,'spike').setDepth(6).setTint(this.theme.spikeTint);
      s.obstacleType='spike';this.obstacles.add(s);
    }
    for(let i=0;i<numBot;i++){
      const s=this.add.image(sx+i*sp,TUNNEL_BOTTOM-6,'spike_up').setDepth(6).setTint(this.theme.spikeTint);
      s.obstacleType='spike';this.obstacles.add(s);
    }
    this._placeCoin(sx-35,H/2,wx-35);
  }

  _doMoving(sx,wx){
    const b=this.add.image(sx,H/2,'block').setScale(1.6).setDepth(6).setTint(this.theme.blockTint);
    b.obstacleType='moving';
    b.moveSpeed=lerp(60,170,this.levelIndex/7)*(Math.random()>0.5?1:-1);
    b.minY=TUNNEL_TOP+24;b.maxY=TUNNEL_BOTTOM-24;
    this.obstacles.add(b);
    this._placeCoin(sx-70,Math.random()>0.5?TUNNEL_TOP+38:TUNNEL_BOTTOM-38,wx-70);
  }

  _doLaser(sx,wx){
    const d=this.levelIndex/7;
    const gfx=this.add.graphics().setDepth(7);
    this.laserList.push({gfx,x:sx,period:lerp(2.4,1.3,d),phase:Math.random(),onRatio:lerp(0.35,0.55,d)});
    this._placeCoin(sx-80,H/2,wx-80);
  }

  _placeCoin(sx,sy,wx){
    sy=clamp(sy,TUNNEL_TOP+22,TUNNEL_BOTTOM-22);
    for(const obs of this.obstacles.getChildren()){
      if(Math.abs(obs.x-sx)<obs.displayWidth/2+18&&Math.abs(obs.y-sy)<obs.displayHeight/2+18)return;
    }
    // Determine pickup type
    const r=Math.random();
    let tex='coin',isRare=false,isPowerup=false,powerupType=null;
    if(r<0.055&&!this.hasShield&&this.magnetTimer<=0){
      isPowerup=true; powerupType=this._levelPowerup;
      tex=powerupType==='shield'?'powerup_shield':'powerup_magnet';
    } else if(r<0.18){
      isRare=true; tex='coin_rare';
    }
    const c=this.add.image(sx,sy,tex).setDepth(7).setScale(isPowerup?1.7:isRare?1.6:1.5);
    c.bobOffset=Math.random()*Math.PI*2; c.worldX=wx;
    c.isRare=isRare; c.isPowerup=isPowerup; c.powerupType=powerupType;
    this.coins.add(c);
  }

  // ── Finish line ────────────────────────────────────────────────────────────
  _updateFinishLine(){
    const sx=PLAYER_X+(this.lvl.distance-this.distTraveled);
    this.finishTxt.x=sx;
    if(this.unlockedMsg.alpha>0)this.unlockedMsg.setAlpha(Math.max(0,this.unlockedMsg.alpha-0.025));
    if(!this.safetyCoinsSpawned&&this.distTraveled>this.lvl.distance-600){
      this.safetyCoinsSpawned=true;
      [{wx:this.lvl.distance-340,sy:H/2},{wx:this.lvl.distance-230,sy:TUNNEL_TOP+55},{wx:this.lvl.distance-130,sy:TUNNEL_BOTTOM-55}]
      .forEach(p=>this._placeCoin(this._w2s(p.wx),p.sy,p.wx));
    }
    const g=this.finishGfx;g.clear();
    if(sx<-20||sx>W+20)return;
    const locked=this.coinsCollected<this.lvl.required;
    this.finishPulse=(this.finishPulse+0.08)%(Math.PI*2);
    const pulse=0.6+Math.sin(this.finishPulse)*0.4;
    const lc=locked?0xff3333:0xffff00,cc=locked?0xff6666:0xffffff,ac=locked?0xaa0000:0xffff00;
    const sqH=18;
    for(let y=TUNNEL_TOP;y<TUNNEL_BOTTOM;y+=sqH){
      g.fillStyle((Math.floor((y-TUNNEL_TOP)/sqH)%2)===0?cc:ac,pulse*0.9);
      g.fillRect(sx-5,y,10,sqH);
    }
    g.lineStyle(3,lc,pulse);g.beginPath();g.moveTo(sx,TUNNEL_TOP);g.lineTo(sx,TUNNEL_BOTTOM);g.strokePath();
    g.lineStyle(16,lc,pulse*0.18);g.beginPath();g.moveTo(sx,TUNNEL_TOP);g.lineTo(sx,TUNNEL_BOTTOM);g.strokePath();
    if(sx<=PLAYER_X+8&&!this.levelDone)this._completeLEVEL();
  }

  // ── Update ─────────────────────────────────────────────────────────────────
  update(time,delta){
    if(!this.alive||this._paused)return;
    const dt=delta/1000;

    this.coins.getChildren().forEach(c=>{
      c.y+=Math.sin(time*0.003+c.bobOffset)*0.4;
      c.setScale(1.4+Math.sin(time*0.004+c.bobOffset)*0.1);
    });
    if(!this.gameStarted)return;

    this.flipCooldown=Math.max(0,this.flipCooldown-dt);
    this._closeCallCooldown=Math.max(0,this._closeCallCooldown-dt);
    // Input buffer: fire queued flip as soon as cooldown clears
    if(this._inputBuf>0){
      this._inputBuf=Math.max(0,this._inputBuf-dt);
      if(this.flipCooldown<=0)this._doFlip();
    }
    const prog=clamp(this.distTraveled/this.lvl.distance,0,1);
    // Non-linear: ease in slow, ramp hard in final 30%
    const isIntense=prog>0.70;
    const baseSpeed=lerp(this.lvl.startSpeed*0.88,this.lvl.endSpeed,prog);
    this.speed=baseSpeed*(isIntense?1+(prog-0.70)*0.65:1);
    this.distTraveled+=this.speed*dt;
    this.levelScore=Math.floor(this.distTraveled/8);
    const currentScore=this.totalScore+this.levelScore;
    this.scoreTxt.setText(`${currentScore}`);
    if(CHALLENGE.active&&!this._challengeBeat&&currentScore>=CHALLENGE.score){
      this._challengeBeat=true;
      if(this.challengeTxt)this.challengeTxt.setColor('#00ff88');
      this._floatText(W/2,H/2-40,'\u2694 CHALLENGE BEATEN!','#00ff88');
      this.cameras.main.flash(200,0,255,100,false);
    }

    // Gentle gravity
    this.vy+=GRAVITY_FORCE*this.gravDir*dt;
    this.vy=clamp(this.vy,-VEL_MAX,VEL_MAX);
    this.player.y+=this.vy*dt;
    this.player.setRotation(clamp(this.vy*0.0007,-0.3,0.3));

    this.trailHist.unshift({x:this.player.x,y:this.player.y});
    this.trailHist=this.trailHist.slice(0,6);
    this.trail.forEach((t,i)=>{const h=this.trailHist[i]||this.trailHist[this.trailHist.length-1];t.x=h.x;t.y=h.y;t.setRotation(this.player.rotation);});

    // Engine trail
    this.trailTimer+=dt;
    if(this.trailTimer>0.038){
      this.trailTimer=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=this.player.x-10;p.y=this.player.y+(Math.random()-0.5)*5;p.vx=-30-Math.random()*45;p.vy=(Math.random()-0.5)*22;p.life=0.32;p.setTint(0x00ffff);p.setScale(1.4);}
    }

    const ph=this.player.displayHeight/2;
    if(this.player.y-ph<=TUNNEL_TOP||this.player.y+ph>=TUNNEL_BOTTOM){
      if(this._inputBuf>0){
        // Coyote grace: tap was queued — clamp player back and flip instead of dying
        this.player.y=clamp(this.player.y,TUNNEL_TOP+ph+1,TUNNEL_BOTTOM-ph-1);
        this._doFlip();
      } else {this._die();return;}
    }

    this.stars.getChildren().forEach(s=>{s.x-=this.speed*dt*s.scrollX;if(s.x<-2)s.x=W+2;});

    for(const obs of this.obstacles.getChildren().slice()){
      obs.x-=this.speed*dt;
      if(obs.obstacleType==='moving'){obs.y+=obs.moveSpeed*dt;if(obs.y<obs.minY||obs.y>obs.maxY)obs.moveSpeed*=-1;}
      if(this._aabb(this.player,obs)){this._die();return;}
      if(!this._nearMissObstacles.has(obs)&&this._nearMissCheck(this.player,obs)){
        this._nearMissObstacles.add(obs);
        this._triggerNearMiss(obs);
      }
      if(obs.x<-60){this._nearMissObstacles.delete(obs);this.obstacles.remove(obs,true,true);}
    }

    for(let i=this.laserList.length-1;i>=0;i--){
      const laser=this.laserList[i];
      laser.x-=this.speed*dt;
      if(laser.x<-40){laser.gfx.destroy();this.laserList.splice(i,1);continue;}
      const phase=((time/1000)/laser.period+laser.phase)%1;
      laser.isOn=phase<laser.onRatio;
      this._drawLaser(laser,phase);
      if(laser.isOn&&Math.abs(this.player.x-laser.x)<10){this._die();return;}
    }

    // Magnet: pull nearby coins toward player
    if(this.magnetTimer>0){
      this.magnetTimer=Math.max(0,this.magnetTimer-dt);
      for(const c of this.coins.getChildren()){
        const dx=this.player.x-c.x,dy=this.player.y-c.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<160&&dist>1){const f=Math.min(300,9000/dist);c.x+=dx/dist*f*dt;c.y+=dy/dist*f*dt;}
      }
    }
    for(const c of this.coins.getChildren().slice()){
      c.x-=this.speed*dt;
      if(Phaser.Math.Distance.Between(this.player.x,this.player.y,c.x,c.y)<(c.isPowerup?28:22))this._collectCoin(c);
      if(c.x<-30)this.coins.remove(c,true,true);
    }

    const clearBefore=this.lvl.distance-450;
    if(this.distTraveled+400<clearBefore){
      const spawnWX=this.distTraveled+(W-PLAYER_X)+100;
      if(spawnWX>=this.nextObstacleWorldX&&this.nextObstacleWorldX<clearBefore){
        this._spawnCluster(this.nextObstacleWorldX);
        const sp=isIntense?Math.floor(this.lvl.spacing*0.62):this.lvl.spacing;
        this.nextObstacleWorldX+=Phaser.Math.Between(Math.floor(sp*0.85),Math.floor(sp*1.18));
      }
    }

    this.particles.getChildren().forEach(p=>{
      if(!p.active)return;
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.91;p.vy*=0.91;
      p.life-=dt*2.5;p.setAlpha(Math.max(0,p.life));
      if(p.life<=0)p.setActive(false).setVisible(false);
    });

    if(this.cameraShake>0){
      this.cameraShake-=dt*2.2;
      const mag=this.cameraShake*6;
      this.cameras.main.setScroll((Math.random()-0.5)*mag,(Math.random()-0.5)*mag);
    } else this.cameras.main.setScroll(0,0);

    // Shockwave ring + directional arrow
    this.flipGfx.clear();
    if(this._shockwave){
      const sw=this._shockwave;
      sw.r+=185*dt;
      sw.alpha=Math.max(0,(1-sw.r/sw.maxR)*0.88);
      if(sw.alpha<=0){this._shockwave=null;}
      else {
        this.flipGfx.lineStyle(3,sw.color,sw.alpha);
        this.flipGfx.strokeCircle(sw.x,sw.y,sw.r);
        this.flipGfx.lineStyle(10,sw.color,sw.alpha*0.20);
        this.flipGfx.strokeCircle(sw.x,sw.y,sw.r);
        // Directional arrow tip in the direction of new gravity
        const tipY=sw.y+sw.dir*sw.r;
        const baseY=sw.y+sw.dir*(sw.r-14);
        this.flipGfx.fillStyle(0xffffff,sw.alpha*0.85);
        this.flipGfx.fillTriangle(sw.x-8,baseY,sw.x+8,baseY,sw.x,tipY);
      }
    }

    // Shield aura
    this.shieldAura.clear();
    if(this.hasShield){
      const a=0.55+Math.sin(time*0.009)*0.3;
      this.shieldAura.lineStyle(4,0x00ff88,a);this.shieldAura.strokeCircle(this.player.x,this.player.y,30);
      this.shieldAura.lineStyle(8,0x00ff88,a*0.22);this.shieldAura.strokeCircle(this.player.x,this.player.y,35);
    }
    // Power-up bar
    this.powerupGfx.clear();
    if(this.powerupType==='magnet'&&this.magnetTimer>0){
      this.powerupTxt.setText('\u2726 MAGNET');
      const pct=this.magnetTimer/this.powerupMax;
      this.powerupGfx.fillStyle(0x004466,0.7);this.powerupGfx.fillRect(10,50,80,7);
      this.powerupGfx.fillStyle(0x00ffff,0.9);this.powerupGfx.fillRect(10,50,80*pct,7);
    } else if(this.powerupType==='shield'&&this.hasShield){
      this.powerupTxt.setText('\u25c9 SHIELD');
      this.powerupGfx.fillStyle(0x00ff88,0.7);this.powerupGfx.fillRect(10,50,80,7);
    } else {
      this.powerupTxt.setText('');
      if(!this.hasShield&&this.magnetTimer<=0)this.powerupType=null;
    }
    this._themeAmbient(dt,time);
    this._drawWalls(this.distTraveled,time);
    this._updateHUD(prog);
    this._updateFinishLine();
  }

  _drawLaser(laser,phase){
    const g=laser.gfx,lc=this.theme.laserCol; g.clear();
    if(laser.x<-20||laser.x>W+20)return;
    if(laser.isOn){
      g.lineStyle(6,lc,1);g.beginPath();g.moveTo(laser.x,TUNNEL_TOP);g.lineTo(laser.x,TUNNEL_BOTTOM);g.strokePath();
      g.lineStyle(20,lc,0.28);g.beginPath();g.moveTo(laser.x,TUNNEL_TOP);g.lineTo(laser.x,TUNNEL_BOTTOM);g.strokePath();
      g.lineStyle(2,0xffffff,0.7);g.beginPath();g.moveTo(laser.x,TUNNEL_TOP);g.lineTo(laser.x,TUNNEL_BOTTOM);g.strokePath();
      g.fillStyle(lc,1);g.fillCircle(laser.x,TUNNEL_TOP,7);g.fillCircle(laser.x,TUNNEL_BOTTOM,7);
    } else {
      const offPhase=(phase-laser.onRatio)/(1-laser.onRatio);
      if(offPhase>0.65){
        const flash=0.25+0.5*Math.sin(offPhase*30);
        g.lineStyle(2,lc,flash);g.beginPath();g.moveTo(laser.x,TUNNEL_TOP);g.lineTo(laser.x,TUNNEL_BOTTOM);g.strokePath();
        g.fillStyle(lc,flash);g.fillCircle(laser.x,TUNNEL_TOP,5);g.fillCircle(laser.x,TUNNEL_BOTTOM,5);
      } else {
        g.fillStyle(lc,0.35);g.fillCircle(laser.x,TUNNEL_TOP,5);g.fillCircle(laser.x,TUNNEL_BOTTOM,5);
        g.lineStyle(1,lc,0.25);g.beginPath();g.moveTo(laser.x,TUNNEL_TOP+8);g.lineTo(laser.x,TUNNEL_BOTTOM-8);g.strokePath();
      }
    }
  }

  _collectCoin(c){
    if(c.isPowerup){
      this._activatePowerup(c.powerupType);
      this._floatText(c.x,c.y-24,c.powerupType.toUpperCase()+'!','#00ff88');
      this._emitParticles(c.x,c.y,[0x00ff88,0x88ffcc,0xffffff],14,80,170);
      this.coins.remove(c,true,true); return;
    }
    const pts=c.isRare?500:100;
    this.coinsCollected++; this.levelScore+=pts;
    const req=this.lvl.required,met=this.coinsCollected>=req;
    this.coinTxt.setText(`\u25c6 ${this.coinsCollected}/${req}`).setColor(met?'#00ff88':'#ffdd00');
    this._emitParticles(c.x,c.y,c.isRare?[0x9933ff,0xcc88ff,0xffffff]:[0xffdd00,0xffee66,0xffffff],c.isRare?24:14,80,170);
    this.tweens.add({targets:this.coinTxt,scaleX:1.7,scaleY:1.7,duration:90,yoyo:true,ease:'Back.easeOut'});
    if(met&&this.coinsCollected===req){this.cameras.main.flash(120,0,255,100,false);this.unlockedMsg.setAlpha(1);}
    this._floatText(c.x,c.y-20,c.isRare?'+5':'+1',c.isRare?'#cc88ff':'#ffdd00');
    if(c.isRare)AUDIO.coinRare();else AUDIO.coin();
    this.coins.remove(c,true,true);
  }

  _aabb(a,b){
    // Player hitbox ≈60% of sprite for "barely escaped" feel
    const aw=a.displayWidth*0.28,ah=a.displayHeight*0.28,bw=b.displayWidth*0.50,bh=b.displayHeight*0.50;
    return Math.abs(a.x-b.x)<(aw+bw)/2&&Math.abs(a.y-b.y)<(ah+bh)/2;
  }

  // Near-miss zone: player graphic size (~50%) vs obstacle wider collision zone (~70%)
  _nearMissCheck(a,b){
    const aw=a.displayWidth*0.50,ah=a.displayHeight*0.50,bw=b.displayWidth*0.70,bh=b.displayHeight*0.70;
    return Math.abs(a.x-b.x)<(aw+bw)/2&&Math.abs(a.y-b.y)<(ah+bh)/2;
  }

  _triggerNearMiss(obs){
    // Flash obstacle red
    const origTint=obs.obstacleType==='spike'?this.theme.spikeTint:this.theme.blockTint;
    obs.setTint(0xff2222);
    this.time.delayedCall(160,()=>{if(obs.scene)obs.setTint(origTint);});
    // Sparks at nearest point on obstacle surface
    const nx=clamp(this.player.x,obs.x-obs.displayWidth*0.5,obs.x+obs.displayWidth*0.5);
    const ny=clamp(this.player.y,obs.y-obs.displayHeight*0.5,obs.y+obs.displayHeight*0.5);
    this._emitParticles(nx,ny,[0xff3333,0xff8800,0xffdd44,0xffffff],10,35,120);
    // Light shake (softer than death)
    this.cameraShake=Math.max(this.cameraShake,0.038);
    // Screen tint flash
    this.cameras.main.flash(55,255,60,0,false);
    // "CLOSE CALL!" text — rate-limited so it doesn't spam
    if(this._closeCallCooldown<=0){
      this._floatText(this.player.x,this.player.y-40,'CLOSE CALL!','#ff5555');
      this._closeCallCooldown=1.4;
    }
    AUDIO.nearMiss();
  }

  _floatText(x,y,txt,color='#ffdd00'){
    const t=this.add.text(x,y,txt,{fontFamily:'"Press Start 2P"',fontSize:'10px',color,shadow:{x:1,y:1,color:'#000000',blur:0,fill:true}}).setOrigin(0.5).setDepth(25);
    this.tweens.add({targets:t,y:y-48,alpha:0,duration:780,ease:'Power2',onComplete:()=>t.destroy()});
  }

  _activatePowerup(type){
    this.powerupType=type;
    if(type==='shield'){
      this.hasShield=true; this.powerupMax=1;
      AUDIO.shieldGet();
    } else {
      this.magnetTimer=5; this.powerupMax=5;
      AUDIO.magnetGet();
    }
  }

  _updateHUD(prog){
    const g=this.progGfx;g.clear();
    const bw=(W-20)*clamp(prog,0,1);
    if(bw>1){g.fillStyle(this.theme.wallLine,0.5);g.fillRect(10,TUNNEL_TOP+3,bw,4);g.fillStyle(0xffffff,0.2);g.fillRect(10,TUNNEL_TOP+3,bw,1);}
    g.fillStyle(0xffff00,0.9);g.fillRect(W-14,TUNNEL_TOP+2,6,6);
  }

  _completeLEVEL(){
    if(this.levelDone||!this.alive)return;
    this.levelDone=true;this.alive=false;
    const passed=this.coinsCollected>=this.lvl.required;
    if(passed){
      AUDIO.complete();
      this.cameras.main.flash(300,50,255,100,false);
      for(let i=0;i<8;i++) this.time.delayedCall(i*90,()=>this._emitParticles(Phaser.Math.Between(40,W-40),Phaser.Math.Between(TUNNEL_TOP+20,TUNNEL_BOTTOM-20),[0xffdd00,0x00ffcc,0xff44ff,0xffffff,0x00ffff],20,100,260));
      const fs=this.totalScore+this.levelScore;
      const best=parseInt(localStorage.getItem('gf_best')||'0');
      if(fs>best)localStorage.setItem('gf_best',fs);
      const bLvl=parseInt(localStorage.getItem('gf_level')||'1');
      if(this.levelIndex+1>bLvl)localStorage.setItem('gf_level',this.levelIndex+1);
      this.time.delayedCall(1000,()=>{AUDIO.stopMusic();this.scene.start('LevelComplete',{levelIndex:this.levelIndex,coinsCollected:this.coinsCollected,totalCoins:this.lvl.coins,requiredCoins:this.lvl.required,levelScore:this.levelScore,totalScore:fs,isLastLevel:this.levelIndex>=LEVELS.length-1});});
    } else {
      AUDIO.failed();
      this.cameras.main.flash(250,255,80,0,false);
      this.player.setVisible(false);this.trail.forEach(t=>t.setVisible(false));
      this.time.delayedCall(700,()=>{AUDIO.stopMusic();this.scene.start('LevelFailed',{levelIndex:this.levelIndex,coinsCollected:this.coinsCollected,requiredCoins:this.lvl.required,levelScore:this.levelScore,totalScore:this.totalScore});});
    }
  }

  _die(){
    if(!this.alive)return;
    if(this.hasShield){
      this.hasShield=false; this.powerupType=null;
      AUDIO.shieldHit();
      this.cameras.main.shake(200,0.015);
      this.cameras.main.flash(80,0,255,150,false);
      this._emitParticles(this.player.x,this.player.y,[0x00ff88,0x88ffcc,0xffffff],20,100,220);
      this.flipCooldown=0.3; return; // absorb hit!
    }
    this.alive=false;AUDIO.death();
    this.cameras.main.shake(480,0.022);
    this.cameras.main.flash(60,255,255,255,false);
    this.time.delayedCall(60,()=>this.cameras.main.flash(200,255,40,40,false));
    for(let i=0;i<44;i++){
      const p=this.add.image(this.player.x,this.player.y,'particle').setDepth(20).setScale(Phaser.Math.Between(1,5));
      const a=Math.random()*Math.PI*2,s=Phaser.Math.Between(80,320);
      p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=1;
      p.setTint([0xff3300,0xffee00,0xff8800,0xffffff][Math.floor(Math.random()*4)]);
      this.tweens.add({targets:p,alpha:0,scale:0,duration:600+Math.random()*500,onComplete:()=>p.destroy()});
    }
    this.player.setVisible(false);this.trail.forEach(t=>t.setVisible(false));
    const fs=this.totalScore+this.levelScore;
    const best=parseInt(localStorage.getItem('gf_best')||'0');
    if(fs>best)localStorage.setItem('gf_best',fs);
    this.time.delayedCall(1000,()=>{AUDIO.stopMusic();this.scene.start('Death',{levelIndex:this.levelIndex,score:fs,coinsCollected:this.coinsCollected});});
  }
}

// ── LevelCompleteScene ────────────────────────────────────────────────────────
class LevelCompleteScene extends Phaser.Scene{
  constructor(){super('LevelComplete');}
  init(d){this.levelIndex=d.levelIndex;this.coinsCollected=d.coinsCollected;this.requiredCoins=d.requiredCoins;this.levelScore=d.levelScore;this.totalScore=d.totalScore;this.isLastLevel=d.isLastLevel;}
  create(){
    AUDIO.init();AUDIO.resume();
    if(this.isLastLevel)saveScore(this.totalScore,this.levelIndex);
    const nt=getLevelTrack(this.isLastLevel?0:this.levelIndex+1);
    this.cameras.main.setBackgroundColor(nt.bg);
    const best=parseInt(localStorage.getItem('gf_best')||'0');
    const coinBonus=this.coinsCollected*100, isNew=this.totalScore>=best&&this.totalScore>0;
    const ni=this.isLastLevel?0:this.levelIndex+1, ns=this.isLastLevel?0:this.totalScore;
    OV.show('ov-complete',
      `<div class="ov-wrap">
        <div class="ov-sub" style="color:#888">LEVEL</div>
        <div class="ov-title" style="color:#00ff88;text-shadow:3px 3px #006633">${this.levelIndex+1} COMPLETE!</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">LEVEL SCORE</div>
        <div class="ov-score" style="color:#00ffff">${this.levelScore}</div>
        <div class="ov-sub" style="color:#ffdd00">\u25c6 COINS ${this.coinsCollected}/${this.requiredCoins} REQ</div>
        ${coinBonus>0?`<div class="ov-sub" style="color:#ffaa00">+${coinBonus} COIN BONUS</div>`:''}
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">TOTAL SCORE</div>
        <div class="ov-score" style="color:${isNew?'#ffff00':'#ffffff'}">${this.totalScore}</div>
        ${isNew?'<div class="ov-sub" style="color:#ffff00">\u2605 NEW BEST! \u2605</div>':''}
        ${CHALLENGE.active?(()=>{const diff=this.totalScore-CHALLENGE.score;const won=diff>=0;return`<div style="border:2px solid ${won?'#00ff88':'#ff4444'};padding:6px 8px;margin:6px 0;font-size:clamp(8px,2.2vw,10px)"><div style="color:#888;margin-bottom:2px">VS ${CHALLENGE.name}</div><div style="color:${won?'#00ff88':'#ff4444'}">${won?'\u25b2 CHALLENGE BEATEN! +'+diff:'\u25bc LOST BY '+Math.abs(diff)}</div></div>`;})():''}
        ${!this.isLastLevel?`<div class="ov-sub" style="color:#aaa">NEXT: LVL ${this.levelIndex+2} \u2022 ${nt.name}</div>`:''}
        <button class="ov-btn" id="ov-next" style="margin-top:16px;border-color:#00ff88;color:#00ff88">${this.isLastLevel?'\u25b6 PLAY AGAIN':'\u25b6 LEVEL '+(this.levelIndex+2)}</button>
        <button class="ov-btn ov-btn-sm" id="ov-home">\u2190 MAIN MENU</button>
        <div id="complete-share"></div>
      </div>`);
    this.events.once('shutdown',()=>OV.hide());
    this.time.delayedCall(400,()=>{
      let going=false;
      const next=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.time.delayedCall(50,()=>this.scene.start('Game',{levelIndex:ni,totalScore:ns}));};
      const home=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
      addTap(document.getElementById('ov-next'),next);
      addTap(document.getElementById('ov-home'),home);
      const pn=(localStorage.getItem('gf_name')||'PLAYER').trim().toUpperCase().substring(0,12);
      wireShareBtns('complete-share',pn,this.totalScore);
      if(this.input.keyboard){this.input.keyboard.once('keydown-SPACE',next);this.input.keyboard.once('keydown-ENTER',next);}
    });
  }
}

// ── LevelFailedScene ──────────────────────────────────────────────────────────
class LevelFailedScene extends Phaser.Scene{
  constructor(){super('LevelFailed');}
  init(d){this.levelIndex=d.levelIndex;this.coinsCollected=d.coinsCollected;this.requiredCoins=d.requiredCoins;this.levelScore=d.levelScore;this.totalScore=d.totalScore;}
  create(){
    AUDIO.init();AUDIO.resume();
    const theme=getLevelTrack(this.levelIndex);
    this.cameras.main.setBackgroundColor(theme.bg);
    const short=this.requiredCoins-this.coinsCollected;
    OV.show('ov-failed',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#ff5500;text-shadow:3px 3px #661100">LEVEL<br>FAILED</div>
        <div class="ov-sub" style="color:#ffaa44;margin-top:6px">NOT ENOUGH COINS!</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">YOU COLLECTED</div>
        <div class="ov-score" style="color:#ffdd00">${this.coinsCollected} / ${this.requiredCoins}</div>
        <div class="ov-sub" style="color:#ff8888">COLLECT ${short} MORE NEXT TIME</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#555">LEVEL SCORE: ${this.levelScore}</div>
        <button class="ov-btn" id="ov-retry" style="margin-top:16px">\u25b6 TRY AGAIN</button>
        <button class="ov-btn ov-btn-sm" id="ov-home">\u2190 MAIN MENU</button>
        <div class="ov-sub" style="color:#333;margin-top:6px">level score is lost</div>
      </div>`);
    this.events.once('shutdown',()=>OV.hide());
    this.time.delayedCall(400,()=>{
      let going=false;
      const go=()=>{if(going)return;going=true;OV.hide();this.scene.start('Game',{levelIndex:this.levelIndex,totalScore:this.totalScore});};
      const home=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
      addTap(document.getElementById('ov-retry'),go);
      addTap(document.getElementById('ov-home'),home);
      if(this.input.keyboard){this.input.keyboard.on('keydown-SPACE',go);this.input.keyboard.on('keydown-ENTER',go);}
    });
  }
}

// ── DeathScene ────────────────────────────────────────────────────────────────
class DeathScene extends Phaser.Scene{
  constructor(){super('Death');}
  init(d){this.levelIndex=d.levelIndex||0;this.finalScore=d.score||0;this.coins=d.coinsCollected||0;}
  create(){
    AUDIO.init();AUDIO.resume();
    saveScore(this.finalScore,this.levelIndex);
    const theme=getLevelTrack(this.levelIndex);
    this.cameras.main.setBackgroundColor(theme.bg);
    const best=parseInt(localStorage.getItem('gf_best')||'0');
    const isNew=this.finalScore>=best&&this.finalScore>0;
    const myName=(localStorage.getItem('gf_name')||'').toUpperCase();
    const chalHTML=CHALLENGE.active?(()=>{const diff=this.finalScore-CHALLENGE.score;const won=diff>=0;return`<div style="border:2px solid ${won?'#00ff88':'#ff4444'};padding:6px 8px;margin:6px 0;font-size:clamp(8px,2.2vw,10px)"><div style="color:#888;margin-bottom:2px">VS ${CHALLENGE.name}</div><div style="color:${won?'#00ff88':'#ff4444'}">${won?'\u25b2 CHALLENGE BEATEN! +'+diff:'\u25bc LOST BY '+Math.abs(diff)}</div></div>`;})():'';
    OV.show('ov-death',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#ff4444;text-shadow:3px 3px #880000">GAME<br>OVER</div>
        <div class="ov-sub" style="color:#ff88ff">LEVEL ${this.levelIndex+1} \u2022 ${theme.name}</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">SCORE</div>
        <div class="ov-score" style="color:${isNew?'#ffff00':'#00ffff'}">${this.finalScore}</div>
        ${isNew?'<div class="ov-sub" style="color:#ffff00">\u2605 NEW BEST! \u2605</div>':`<div class="ov-sub" style="color:#ffff00">BEST: ${best}</div>`}
        <div class="ov-sub" style="color:#ffdd00">\u25c6 COINS: ${this.coins}</div>
        ${chalHTML}
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#666;margin-bottom:2px">\u2605 HALL OF FAME</div>
        <div class="lb-list" id="lb-death"><div style="text-align:center;padding:10px 0"><span class="lb-spin"></span></div></div>
        <hr class="ov-rule">
        <button class="ov-btn" id="ov-retry" style="border-color:#00ffff;color:#00ffff">\u25b6 TRY AGAIN</button>
        <button class="ov-btn ov-btn-sm" id="ov-home">\u2190 MAIN MENU</button>
        <div id="death-share"></div>
      </div>`);
    fillLbAsync('lb-death',myName);
    this.events.once('shutdown',()=>OV.hide());
    this.time.delayedCall(400,()=>{
      let going=false;
      const go=(li)=>{if(going)return;going=true;OV.hide();this.scene.start('Game',{levelIndex:li,totalScore:0});};
      const home=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
      addTap(document.getElementById('ov-retry'),()=>go(this.levelIndex));
      addTap(document.getElementById('ov-home'),home);
      wireShareBtns('death-share',myName||'PLAYER',this.finalScore);
      if(this.input.keyboard){
        this.input.keyboard.on('keydown-SPACE',()=>go(this.levelIndex));
        this.input.keyboard.on('keydown-ENTER',()=>go(this.levelIndex));
      }
    });
  }
}

// ── LeaderboardScene ──────────────────────────────────────────────────────────
class LeaderboardScene extends Phaser.Scene{
  constructor(){super('Leaderboard');}
  create(){
    AUDIO.init();
    const myName=(localStorage.getItem('gf_name')||'').toUpperCase();
    OV.show('ov-lb',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#ffdd00;text-shadow:3px 3px #886600">\u2605 HALL OF FAME</div>
        <div class="ov-sub" style="color:#555;margin-bottom:4px">TOP SCORES</div>
        <div class="lb-list" id="lb-main"><div style="text-align:center;padding:18px 0"><span class="lb-spin"></span></div></div>
        <button class="ov-btn" id="lb-back" style="margin-top:14px;border-color:#00ffff;color:#00ffff">\u25c4 BACK</button>
        <button class="ov-btn ov-btn-sm" id="lb-clear" style="color:#222;border-color:#1a1a1a;margin-top:2px">CLEAR SCORES</button>
      </div>`,'rgba(0,0,8,0.97)');
    fillLbAsync('lb-main',myName);
    addTap(document.getElementById('lb-back'),()=>{OV.hide();this.scene.start('Menu');});
    addTap(document.getElementById('lb-clear'),()=>{
      if(confirm('Clear all local scores?')){localStorage.removeItem('gf_scores');OV.hide();this.scene.restart();}
    });
    this.events.once('shutdown',()=>OV.hide());
    if(this.input.keyboard)this.input.keyboard.once('keydown-ESCAPE',()=>{OV.hide();this.scene.start('Menu');});
  }
}

new Phaser.Game({
  type:Phaser.AUTO,width:W,height:H,backgroundColor:'#000011',parent:document.body,
