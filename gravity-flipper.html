    OV.show('ov-complete',
      `<div class="ov-wrap">
        <div class="ov-sub" style="color:#888">LEVEL</div>
        <div class="ov-title" style="color:#00ff88;text-shadow:3px 3px #006633">${this.levelIndex+1} COMPLETE!</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">LEVEL SCORE</div>
        <div class="ov-score" style="color:#00ffff">${this.levelScore}</div>
        <div class="ov-sub" style="color:#ffdd00">\u25c6 COINS ${this.coinsCollected}/${this.requiredCoins} REQ</div>
        ${coinBonus>0?`<div class="ov-sub" style="color:#ffaa00">+${coinBonus} COIN BONUS</div>`:''}
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">TOTAL SCORE</div>
        <div class="ov-score" style="color:${isNew?'#ffff00':'#ffffff'}">${this.totalScore}</div>
        ${isNew?'<div class="ov-sub" style="color:#ffff00">\u2605 NEW BEST! \u2605</div>':''}
        ${CHALLENGE.active?(()=>{const diff=this.totalScore-CHALLENGE.score;const won=diff>=0;return`<div style="border:2px solid ${won?'#00ff88':'#ff4444'};padding:6px 8px;margin:6px 0;font-size:clamp(8px,2.2vw,10px)"><div style="color:#888;margin-bottom:2px">VS ${CHALLENGE.name}</div><div style="color:${won?'#00ff88':'#ff4444'}">${won?'\u25b2 CHALLENGE BEATEN! +'+diff:'\u25bc LOST BY '+Math.abs(diff)}</div></div>`;})():''}
        ${!this.isLastLevel?`<div class="ov-sub" style="color:#aaa">NEXT: LVL ${this.levelIndex+2} \u2022 ${nt.name}</div>`:''}
        <button class="ov-btn" id="ov-next" style="margin-top:16px;border-color:#00ff88;color:#00ff88">${this.isLastLevel?'\u25b6 PLAY AGAIN':'\u25b6 LEVEL '+(this.levelIndex+2)}</button>
        <button class="ov-btn ov-btn-sm" id="ov-home">\u2190 MAIN MENU</button>
        <div id="complete-share"></div>
      </div>`);
    this.events.once('shutdown',()=>OV.hide());
    this.time.delayedCall(400,()=>{
      let going=false;
      const next=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.time.delayedCall(50,()=>this.scene.start('Game',{levelIndex:ni,totalScore:ns}));};
      const home=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
      addTap(document.getElementById('ov-next'),next);
      addTap(document.getElementById('ov-home'),home);
      const pn=(localStorage.getItem('gf_name')||'PLAYER').trim().toUpperCase().substring(0,12);
      wireShareBtns('complete-share',pn,this.totalScore);
      if(this.input.keyboard){this.input.keyboard.once('keydown-SPACE',next);this.input.keyboard.once('keydown-ENTER',next);}
    });
  }
}

// ── LevelFailedScene ──────────────────────────────────────────────────────────
class LevelFailedScene extends Phaser.Scene{
  constructor(){super('LevelFailed');}
  init(d){this.levelIndex=d.levelIndex;this.coinsCollected=d.coinsCollected;this.requiredCoins=d.requiredCoins;this.levelScore=d.levelScore;this.totalScore=d.totalScore;}
  create(){
    AUDIO.init();AUDIO.resume();
    addPCoins(this.coinsCollected);
    const theme=getTrack(this.levelIndex);
    this.cameras.main.setBackgroundColor(theme.bg);
    const short=this.requiredCoins-this.coinsCollected;
    OV.show('ov-failed',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#ff5500;text-shadow:3px 3px #661100">LEVEL<br>FAILED</div>
        <div class="ov-sub" style="color:#ffaa44;margin-top:6px">NOT ENOUGH COINS!</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">YOU COLLECTED</div>
        <div class="ov-score" style="color:#ffdd00">${this.coinsCollected} / ${this.requiredCoins}</div>
        <div class="ov-sub" style="color:#ff8888">COLLECT ${short} MORE NEXT TIME</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#555">LEVEL SCORE: ${this.levelScore}</div>
        <button class="ov-btn" id="ov-retry" style="margin-top:16px">\u25b6 TRY AGAIN</button>
        <button class="ov-btn ov-btn-sm" id="ov-home">\u2190 MAIN MENU</button>
        <div class="ov-sub" style="color:#333;margin-top:6px">level score is lost</div>
      </div>`);
    this.events.once('shutdown',()=>OV.hide());
    this.time.delayedCall(400,()=>{
      let going=false;
      const go=()=>{if(going)return;going=true;OV.hide();this.scene.start('Game',{levelIndex:this.levelIndex,totalScore:this.totalScore});};
      const home=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
      addTap(document.getElementById('ov-retry'),go);
      addTap(document.getElementById('ov-home'),home);
      if(this.input.keyboard){this.input.keyboard.on('keydown-SPACE',go);this.input.keyboard.on('keydown-ENTER',go);}
    });
  }
}

// ── DeathScene ────────────────────────────────────────────────────────────────
class DeathScene extends Phaser.Scene{
  constructor(){super('Death');}
  init(d){this.levelIndex=d.levelIndex||0;this.finalScore=d.score||0;this.prevScore=d.prevScore||0;this.coins=d.coinsCollected||0;}
  create(){
    AUDIO.init();AUDIO.resume();
    addPCoins(this.coins);
    saveScore(this.finalScore,this.levelIndex);
    const theme=getTrack(this.levelIndex);
    this.cameras.main.setBackgroundColor(theme.bg);
    const prevBest=parseInt(localStorage.getItem('gf_best')||'0');
    const isNew=this.finalScore>0&&this.finalScore>=prevBest;
    if(isNew)localStorage.setItem('gf_best',this.finalScore);
    const myName=(localStorage.getItem('gf_name')||'').toUpperCase();
    const chalHTML=CHALLENGE.active?(()=>{const diff=this.finalScore-CHALLENGE.score;const won=diff>=0;return`<div style="border:2px solid ${won?'#00ff88':'#ff4444'};padding:6px 8px;margin:6px 0;font-size:clamp(8px,2.2vw,10px)"><div style="color:#888;margin-bottom:2px">VS ${CHALLENGE.name}</div><div style="color:${won?'#00ff88':'#ff4444'}">${won?'\u25b2 CHALLENGE BEATEN! +'+diff:'\u25bc LOST BY '+Math.abs(diff)}</div></div>`;})():'';
    const pbHTML=isNew
      ?`<div style="animation:chal-in 0.6s 0.4s both;text-align:center;margin:6px 0 4px">
          <div style="font-size:clamp(22px,7vw,30px);animation:trophy-pulse 0.8s ease-in-out infinite;display:inline-block">&#x1F3C6;</div>
          <div style="color:#ffdd00;font-size:clamp(9px,2.8vw,12px);letter-spacing:1px;margin-top:3px">NEW PERSONAL BEST!</div>
        </div>`
      :`<div style="margin:4px 0 2px">
          <div class="ov-sub" style="color:#888;font-size:clamp(7px,2vw,9px)">PERSONAL BEST</div>
          <div class="ov-score" style="color:#ffff00;font-size:clamp(15px,5vw,20px);margin:1px 0">${prevBest||'-'}</div>
          ${prevBest>0&&this.finalScore>0?`<div class="ov-sub" style="color:#666;font-size:clamp(7px,2vw,9px)">SO CLOSE! TRY AGAIN</div>`:''}
        </div>`;
    OV.show('ov-death',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#ff4444;text-shadow:3px 3px #880000">GAME<br>OVER</div>
        <div class="ov-sub" style="color:#ff88ff">LEVEL ${this.levelIndex+1} \u2022 ${theme.name}</div>
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#888">SCORE</div>
        <div class="ov-score" style="color:${isNew?'#ffff00':'#00ffff'}">${this.finalScore}</div>
        ${pbHTML}
        <div class="ov-sub" style="color:#ffdd00">\u25c6 COINS: ${this.coins}</div>
        ${chalHTML}
        <hr class="ov-rule">
        <div class="ov-sub" style="color:#666;margin-bottom:2px">\u2605 HALL OF FAME</div>
        <div class="lb-list" id="lb-death"><div style="text-align:center;padding:10px 0"><span class="lb-spin"></span></div></div>
        <hr class="ov-rule">
        <button class="ov-btn" id="ov-retry" style="border-color:#00ffff;color:#00ffff">\u25b6 TRY AGAIN</button>
        <button class="ov-btn ov-btn-sm" id="ov-home">\u2190 MAIN MENU</button>
        <div id="death-share"></div>
      </div>`);
    fillLbAsync('lb-death',myName);
    this.events.once('shutdown',()=>OV.hide());
    this.time.delayedCall(400,()=>{
      let going=false;
      const go=(li)=>{if(going)return;going=true;OV.hide();this.scene.start('Game',{levelIndex:li,totalScore:this.prevScore});};
      const home=()=>{if(going)return;going=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
      addTap(document.getElementById('ov-retry'),()=>go(this.levelIndex));
      addTap(document.getElementById('ov-home'),home);
      wireShareBtns('death-share',myName||'PLAYER',this.finalScore);
      if(this.input.keyboard){
        this.input.keyboard.on('keydown-SPACE',()=>go(this.levelIndex));
        this.input.keyboard.on('keydown-ENTER',()=>go(this.levelIndex));
      }
    });
  }
}

// ── LeaderboardScene ──────────────────────────────────────────────────────────
class LeaderboardScene extends Phaser.Scene{
  constructor(){super('Leaderboard');}
  create(){
    AUDIO.init();
    const myName=(localStorage.getItem('gf_name')||'').toUpperCase();
    OV.show('ov-lb',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#ffdd00;text-shadow:3px 3px #886600">\u2605 HALL OF FAME</div>
        <div class="ov-sub" style="color:#555;margin-bottom:4px">TOP SCORES</div>
        <div class="lb-list" id="lb-main"><div style="text-align:center;padding:18px 0"><span class="lb-spin"></span></div></div>
        <button class="ov-btn" id="lb-back" style="margin-top:14px;border-color:#00ffff;color:#00ffff">\u25c4 BACK</button>
        <button class="ov-btn ov-btn-sm" id="lb-clear" style="color:#222;border-color:#1a1a1a;margin-top:2px">CLEAR SCORES</button>
      </div>`,'rgba(0,0,8,0.97)');
    fillLbAsync('lb-main',myName);
    addTap(document.getElementById('lb-back'),()=>{OV.hide();this.scene.start('Menu');});
    addTap(document.getElementById('lb-clear'),()=>{
      if(confirm('Clear all local scores?')){localStorage.removeItem('gf_scores');OV.hide();this.scene.restart();}
    });
    this.events.once('shutdown',()=>OV.hide());
    if(this.input.keyboard)this.input.keyboard.once('keydown-ESCAPE',()=>{OV.hide();this.scene.start('Menu');});
  }
}

// ── Config ────────────────────────────────────────────────────────────────────
new Phaser.Game({
  type:Phaser.AUTO,width:W,height:H,backgroundColor:'#000011',parent:document.body,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  scene:[BootScene,SplashScene,MenuScene,LeaderboardScene,GameScene,LevelCompleteScene,LevelFailedScene,DeathScene],
  fps:{target:60,forceSetTimeOut:false},
  render:{pixelArt:true,antialias:false}
});
</script>
