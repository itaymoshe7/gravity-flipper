<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;display:flex;justify-content:center;align-items:center;
       width:100vw;height:100vh;overflow:hidden;touch-action:none;}
  canvas{display:block;image-rendering:pixelated;touch-action:manipulation;}
  /* ── Overlay system ─────────────────────────────────────────────────────── */
  .ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:"Press Start 2P",monospace;box-sizing:border-box;padding:12px;
      overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .ov-wrap{width:min(400px,96vw);text-align:center;}
  .ov-title{font-size:clamp(22px,7vw,36px);line-height:1.35;margin-bottom:6px;}
  .ov-sub{font-size:clamp(8px,2.4vw,12px);margin:4px 0;line-height:1.5;}
  .ov-score{font-size:clamp(22px,7vw,32px);margin:4px 0;}
  .ov-rule{width:100%;border:none;border-top:1px solid #333;margin:10px 0;}
  .ov-btn{display:block;width:100%;min-height:54px;padding:14px 20px;margin:6px 0;
          font-family:"Press Start 2P",monospace;font-size:clamp(11px,3.2vw,14px);
          background:transparent;border:2px solid #fff;color:#fff;cursor:pointer;
          touch-action:manipulation;-webkit-tap-highlight-color:transparent;
          user-select:none;letter-spacing:1px;box-sizing:border-box;}
  .ov-btn:active{background:rgba(255,255,255,0.15);}
  .ov-btn-sm{font-size:clamp(9px,2.5vw,11px);min-height:46px;border-color:#555;color:#888;}
  .ov-btn-disabled{opacity:0.3;pointer-events:none;border-color:#444!important;color:#444!important;}
  /* character select grid */
  .ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
  .ch-btn{min-height:62px;padding:8px 4px;background:#111122;border:2px solid #334455;
          color:#888;font-family:"Press Start 2P",monospace;font-size:8px;cursor:pointer;
          touch-action:manipulation;-webkit-tap-highlight-color:transparent;
          display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:4px;width:100%;box-sizing:border-box;}
  .ch-btn.sel{background:#1a1a44;color:#fff;}
  .ch-btn:active,.ch-btn.sel:active{background:#252566;}
  /* track select grid */
  .tr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
  .tr-btn{min-height:58px;padding:6px 4px;background:#0a110a;border:2px solid #334455;
          color:#888;font-family:"Press Start 2P",monospace;font-size:7px;cursor:pointer;
          touch-action:manipulation;-webkit-tap-highlight-color:transparent;
          display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:5px;width:100%;box-sizing:border-box;}
  .tr-btn.sel{color:#fff;}
  .tr-btn:active,.tr-btn.sel:active{filter:brightness(1.25);}
  .tr-swatch{width:68%;height:10px;border-radius:3px;}
  /* 5th track button spans both columns when alone on its row */
  .tr-grid .tr-btn:last-child:nth-child(odd){grid-column:1/-1;max-width:calc(50% - 4px);margin:0 auto;}

  .name-input{width:100%;padding:11px 14px;margin:6px 0;font-family:"Press Start 2P",monospace;
              font-size:clamp(10px,2.8vw,13px);background:#0a0a18;border:2px solid #334;
              color:#fff;text-align:center;box-sizing:border-box;outline:none;
              -webkit-tap-highlight-color:transparent;touch-action:auto;
              letter-spacing:1px;text-transform:uppercase;}
  .name-input:focus{border-color:#00ffff;}
  .name-input::placeholder{color:#333;text-transform:none;}
  /* leaderboard */
  .lb-list{width:100%;margin:8px 0;}
  .lb-row{display:flex;align-items:center;padding:5px 2px;border-bottom:1px solid #1a1a2a;
          color:#555;font-size:clamp(7px,1.9vw,9px);gap:4px;}
  .lb-rank{min-width:26px;color:#666;}
  .lb-name{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-score{min-width:64px;text-align:right;color:#ccc;}

  .lb-row:first-child .lb-rank,.lb-row:first-child .lb-name,.lb-row:first-child .lb-score{color:#ffdd00;}

  .lb-me .lb-rank,.lb-me .lb-name,.lb-me .lb-score{color:#00ffff!important;}

  .lb-spin{display:inline-block;width:14px;height:14px;border:2px solid #1a1a2a;border-top-color:#00ffff;border-radius:50%;animation:lb-s 0.7s linear infinite;vertical-align:middle;}
  @keyframes lb-s{to{transform:rotate(360deg);}}
  /* In-game HTML pause button */
  #game-btn-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;display:none;align-items:center;justify-content:center;}
  #game-btn-frame{position:relative;width:min(100vw,66.667vh);height:min(100vh,150vw);pointer-events:none;}
  .game-hw-btn{position:absolute;width:40px;height:40px;background:rgba(0,0,18,0.75);border:1px solid rgba(0,200,255,0.4);border-radius:10px;color:rgba(120,210,255,0.95);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;touch-action:manipulation;-webkit-tap-highlight-color:transparent;box-shadow:0 0 12px rgba(0,200,255,0.25);transition:background .12s,box-shadow .12s;user-select:none;-webkit-user-select:none;outline:none;-webkit-appearance:none;}
  .game-hw-btn:active{background:rgba(0,190,255,0.22);box-shadow:0 0 22px rgba(0,200,255,0.55);}
  #btn-pause{top:0.83%;right:1.67%;}
  /* Challenge popup animation */
  @keyframes chal-in{from{transform:scale(0.55) translateY(32px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  @keyframes trophy-pulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.22) rotate(5deg)}}

const INPUT_BUFFER=0.11;   // seconds: queue a flip tapped during cooldown

function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ── Challenge URL parsing ──────────────────────────────────────────────────────
const CHALLENGE=(function(){
  try{
    const raw=new URLSearchParams(window.location.search).get('challenge');
    if(raw){const col=raw.lastIndexOf(':');if(col>0){const name=decodeURIComponent(raw.slice(0,col)).toUpperCase().substring(0,12);const score=parseInt(raw.slice(col+1));if(name&&score>0)return{active:true,name,score};}}
  }catch(e){}
  return{active:false,name:'',score:0};
})();

// ── Firebase / Firestore ───────────────────────────────────────────────────────
const FSTORE=(function(){
  let _db=null;
  try{
    if(typeof firebase!=='undefined'){
      firebase.initializeApp({
        apiKey:'AIzaSyD0x-sgEkfBUc3C1VhSlxMItYWROcBHAzk',
        authDomain:'gravity-flipper-2605.firebaseapp.com',
        projectId:'gravity-flipper-2605',
        storageBucket:'gravity-flipper-2605.firebasestorage.app',
        messagingSenderId:'316641691259',
        appId:'1:316641691259:web:c4a36e0fff3af835d684de'
      });
      _db=firebase.firestore();
    }
  }catch(e){console.warn('Firebase:',e);}
  return{
    save(name,score,level){
      if(!_db)return;
      const now=new Date();
      _db.collection('scores').add({name,score,level:level+1,date:`${now.getMonth()+1}/${now.getDate()}`}).catch(e=>e);
    },
    top(n){
      n=n||10;
      if(!_db)return Promise.resolve(null);
      return _db.collection('scores').orderBy('score','desc').limit(n).get()
        .then(snap=>snap.docs.map(d=>d.data()))
        .catch(()=>null);
    }
  };
})();

// ── LB / challenge helpers ─────────────────────────────────────────────────────
function makeLbRows(scores,myName){
  if(!scores||!scores.length)return'<div style="color:#333;font-size:9px;padding:10px 0;text-align:center">NO SCORES YET</div>';
  return scores.slice(0,10).map((s,i)=>{
    const isMe=myName&&s.name===myName;
    const rank=i===0?'\u2605':'#'+(i+1);
    return`<div class="lb-row${isMe?' lb-me':''}"><span class="lb-rank">${rank}</span><span class="lb-name">${s.name}</span><span class="lb-score">${s.score}</span></div>`;
  }).join('');
}
function fillLbAsync(containerId,myName){
  FSTORE.top(10).then(fb=>{const el=document.getElementById(containerId);if(el)el.innerHTML=makeLbRows(fb||getScores(),myName);});
}
function makeChallengeUrl(name,score){
  return`${location.href.split('?')[0]}?challenge=${encodeURIComponent(name)}:${score}`;
}
function wireShareBtns(containerId,name,score){
  const cont=document.getElementById(containerId);if(!cont)return;
  const url=makeChallengeUrl(name,score);
  const buildMessage=(shortUrl)=>`\uD83C\uDFAE ${name} scored ${score} pts in Gravity Flipper!\nCan you beat them? \uD83D\uDC49 ${shortUrl}`;
  const showButtons=(shortUrl)=>{
    const shareText=buildMessage(shortUrl);
    const msg=encodeURIComponent(shareText);
    cont.innerHTML=`
      <div class="ov-sub" style="color:#888;margin:6px 0 4px">SHARE VIA</div>
      <button class="share-btn share-wa" id="${containerId}-wa">\uD83D\uDCAC WHATSAPP</button>
      <button class="share-btn share-gm" id="${containerId}-gm">\uD83D\uDCE7 GMAIL</button>
      <button class="share-btn share-cp" id="${containerId}-cp">\uD83D\uDD17 COPY LINK</button>`;
    addTap(document.getElementById(`${containerId}-wa`),()=>{
      if(navigator.share){
        navigator.share({text:shareText}).catch(()=>{});
      } else {
        window.open(`https://wa.me/?text=${msg}`,'_blank');
      }
    });
    addTap(document.getElementById(`${containerId}-gm`),()=>window.open(`mailto:?subject=${encodeURIComponent('Gravity Flipper Challenge!')}&body=${msg}`,'_self'));
    addTap(document.getElementById(`${containerId}-cp`),()=>{
      navigator.clipboard?navigator.clipboard.writeText(shortUrl).catch(()=>prompt('Copy:',shortUrl)):prompt('Copy:',shortUrl);
      const b=document.getElementById(`${containerId}-cp`);
      if(b){b.textContent='\u2713 COPIED!';b.style.borderColor='#00ff88';b.style.color='#00ff88';}
    });
  };
  cont.innerHTML=`<button class="ov-btn ov-btn-sm" id="${containerId}-t" style="border-color:#ff88ff;color:#ff88ff">\u2694 CHALLENGE A FRIEND</button>`;
  addTap(document.getElementById(`${containerId}-t`),()=>{
    cont.innerHTML=`<div class="ov-sub" style="color:#888;margin:8px 0">Preparing challenge\u2026</div>`;
    fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`)
      .then(r=>r.ok?r.text():Promise.reject())
      .then(short=>showButtons(short.trim()))
      .catch(()=>showButtons(url));
  });
}

// ── Leaderboard helpers ───────────────────────────────────────────────────────
function saveScore(score,levelIndex){
  if(!score||score<=0)return;
  const name=(localStorage.getItem('gf_name')||'UNKNOWN').trim().toUpperCase().substring(0,12)||'UNKNOWN';
  const now=new Date();
  const date=`${now.getMonth()+1}/${now.getDate()}`;
  const scores=JSON.parse(localStorage.getItem('gf_scores')||'[]');
  scores.push({name,score,date});
  scores.sort((a,b)=>b.score-a.score);
  localStorage.setItem('gf_scores',JSON.stringify(scores.slice(0,20)));
  FSTORE.save(name,score,levelIndex||0);
}
function getScores(){return JSON.parse(localStorage.getItem('gf_scores')||'[]');}

function getDailyChallenges(){
  const today=new Date().toDateString();
  const raw=JSON.parse(localStorage.getItem('gf_daily')||'null');
  if(raw&&raw.date===today)return raw;
  const day=Math.floor(Date.now()/86400000);
  let seed=(day^0x5f3759df)>>>0;
  const rng=()=>{seed=(Math.imul(seed,1664525)+1013904223)>>>0;return seed/0xffffffff;};
  const pool=[...DAILY_POOL];const challenges=[];
  while(challenges.length<3&&pool.length>0){
    const idx=Math.floor(rng()*pool.length);
    challenges.push({...pool.splice(idx,1)[0],done:false});
  }
  const data={date:today,challenges};
  localStorage.setItem('gf_daily',JSON.stringify(data));
  return data;
}
function saveDailyChallenges(data){localStorage.setItem('gf_daily',JSON.stringify(data));}
function getPCoins(){return parseInt(localStorage.getItem('gf_pcoins')||'0');}

function removeFromInventory(type){const inv=getInventory();if((inv[type]||0)>0){inv[type]--;setInventory(inv);return true;}return false;}
function isUnlocked(id){
  const all=[...TRACKS,...CHARACTERS];const item=all.find(x=>x.id===id);
  if(!item||item.unlock===0||item.unlock===undefined)return true;
  const u=JSON.parse(localStorage.getItem('gf_unlocked')||'[]');return u.includes(id);

// ── INPUT singleton — canvas-level touchend + click, bypasses Phaser entirely ─
// iOS Safari is most reliable with touchend on the canvas element itself.
const INPUT=(function(){
  let _cv=null, _handlers=[], _dot=null;

  function _toGame(cx,cy){
    const r=_cv.getBoundingClientRect();
    return{x:((cx-r.left)/r.width)*W, y:((cy-r.top)/r.height)*H};
  }
  function _dot_show(cx,cy){
    if(!_dot){
      _dot=document.createElement('div');
      _dot.style.cssText='position:fixed;width:26px;height:26px;border-radius:50%;background:rgba(255,255,0,0.85);border:2px solid #fff;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:opacity 0.35s;opacity:0';
      document.body.appendChild(_dot);
    }
    _dot.style.left=cx+'px'; _dot.style.top=cy+'px'; _dot.style.opacity='1';
    clearTimeout(_dot._t); _dot._t=setTimeout(()=>{_dot.style.opacity='0';},350);
  }
  function _fire(pos){
    const snap=[..._handlers];
    _handlers=_handlers.filter(h=>!h.once);
    snap.forEach(h=>h.fn(pos));
  }
  function _onTouchEnd(e){
    e.preventDefault(); e.stopPropagation();
    const t=e.changedTouches[0];
    _dot_show(t.clientX,t.clientY);
    _fire(_toGame(t.clientX,t.clientY));
  }
  function _onClick(e){
    _dot_show(e.clientX,e.clientY);
    _fire(_toGame(e.clientX,e.clientY));
  }
  return{
    init(canvas){
      _cv=canvas;
      canvas.addEventListener('touchend',_onTouchEnd,{passive:false});
      canvas.addEventListener('mousedown',_onClick); // desktop: faster than click
    },
    on(fn){_handlers.push({fn,once:false});},
    once(fn){_handlers.push({fn,once:true});},
    off(fn){_handlers=_handlers.filter(h=>h.fn!==fn);},
    clear(){_handlers=[];}
  };
})();

// ── OV — HTML overlay manager ─────────────────────────────────────────────────
// Overlays are real DOM elements layered above the canvas; they receive all
// pointer/touch events natively, bypassing Phaser entirely.
const OV={
  _el:null,
  show(id,html,bg){
    this.hide();
    const d=document.createElement('div');
    d.id=id; d.className='ov';
    d.style.background=bg||'rgba(0,0,8,0.88)';
    d.innerHTML=html;
    document.body.appendChild(d);
    this._el=d; return d;
  },
  hide(){if(this._el){this._el.remove();this._el=null;}}
};

// addTap — attach touchend+click to an element with double-fire guard.
// touchend fires first; preventDefault() stops the 300ms synthetic click on iOS.
function addTap(el,fn){
  if(!el)return;
  let last=0;
  const go=(e)=>{
    e.preventDefault(); e.stopPropagation();
    const n=Date.now(); if(n-last<600)return; last=n; fn();
  };
  el.addEventListener('touchend',go,{passive:false});
  el.addEventListener('click',go);
}

// ── MenuScene ─────────────────────────────────────────────────────────────────
class MenuScene extends Phaser.Scene{
  constructor(){super('Menu');}
  create(){
    AUDIO.init();
    this._charIdx=CHARACTERS.findIndex(c=>c.id===(localStorage.getItem('gf_char')||'ship'));
    if(this._charIdx<0||!isUnlocked(CHARACTERS[this._charIdx].id)){
      this._charIdx=CHARACTERS.findIndex(c=>c.unlock===0);if(this._charIdx<0)this._charIdx=0;
    }
    const _menuTracks=TRACKS.filter(t=>t.unlock!==undefined);
    this._trackIdx=TRACKS.findIndex(t=>t.id===(localStorage.getItem('gf_track')||'neon'));
    if(this._trackIdx<0||!_menuTracks.some(t=>TRACKS.indexOf(t)===this._trackIdx)||!isUnlocked(TRACKS[this._trackIdx].id)){
      this._trackIdx=TRACKS.indexOf(_menuTracks.find(t=>t.unlock===0)||_menuTracks[0]);
    }
    this.events.once('shutdown',()=>OV.hide());
    if(CHALLENGE.active){this._showChallengePopup(()=>this._buildMenu());}

  }
  _showChallengePopup(cb){

      `<div class="ov-wrap chal-popup">
        <div class="chal-trophy">\uD83C\uDFC6</div>

        <div class="ov-sub" style="color:#888;margin-bottom:18px">POINTS?</div>
        <button class="ov-btn" id="ov-accept" style="border-color:#ffdd00;color:#ffdd00;font-size:clamp(12px,3.6vw,15px);background:rgba(255,200,0,0.08)">\u2694 ACCEPT CHALLENGE</button>

    const savedName=localStorage.getItem('gf_name')||'';
    const nameValid=savedName.replace(/\s/g,'').length>=2;
    const menuTracks=TRACKS.filter(t=>t.unlock!==undefined);

        </div>`;
      }).join('');
      const trackUnlockRows=UNLOCK_TRACKS.map(item=>{
        const owned=isUnlocked(item.id);
        const canBuy=!owned&&balance>=item.price;
        const btnStyle=owned?'border-color:#555;color:#555':canBuy?`border-color:${item.col};color:${item.col}`:'border-color:#662200;color:#662200';
        const btnLabel=owned?'OWNED':canBuy?'UNLOCK':'NO COINS';
        return `<div style="display:flex;align-items:center;padding:6px 2px;border-bottom:1px solid #1a1a2a;gap:6px">
          <div style="flex:1;text-align:left"><div style="color:${item.col};font-size:8px">${item.name}</div><div style="color:#555;font-size:7px">WORLD UNLOCK</div></div>
          <span style="color:#ffdd00;font-size:9px;white-space:nowrap">${item.price}\u25c6</span>
          <button class="ov-btn ov-btn-sm" id="unlock-track-${item.id}" style="min-height:34px;width:80px;font-size:7px;${btnStyle}">${btnLabel}</button>
        </div>`;
      }).join('');
      OV.show('ov-shop',
        `<div class="ov-wrap">
          <div class="ov-title" style="color:#aa44ff;font-size:clamp(14px,4.5vw,20px)">\uD83D\uDED2 SHOP</div>
