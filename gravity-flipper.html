// ── GameScene ─────────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene{
  constructor(){super('Game');}
  init(d){this.levelIndex=d.levelIndex||0; this.totalScore=d.totalScore||0; this._paused=false; this._startPowerup=d.startPowerup||null;}

  create(){
    this.lvl=getLevel(this.levelIndex);
    this.theme=getTrack(this.levelIndex);
    this.cameras.main.setBackgroundColor(this.theme.bg);
    AUDIO.init(); AUDIO.resume();

    this.speed=this.lvl.startSpeed; this.gravDir=1; this.vy=0;
    this.alive=true; this.gameStarted=false; this.levelDone=false;
    this.distTraveled=0; this.flipCooldown=0;
    this.coinsCollected=0; this.levelScore=0; this.cameraShake=0;
    this.safetyCoinsSpawned=false; this.trailTimer=0;
    this._nearMissObstacles=new Set(); this._closeCallCooldown=0;
    this._inputBuf=0; this._ambientT=0; this._shockwave=null;
    this._challengeBeat=false;
    this.laserList=[]; this.gateList=[]; this._spawnCount=0;
    this._powerup=null; // {type,timer,duration} or null
    this.doubleCoinsActive=false;
    this._pendingPowerup=this._startPowerup||null;
    // Pre-compute evenly distributed obstacle positions: 20%–85% of level
    {
      const d=this.lvl.distance, n=Math.max(1,this.lvl.minCount||2);
      const startWX=d*0.20, endWX=d*0.85;
      this._obstacleSchedule=[];
      if(n===1){
        this._obstacleSchedule.push(Math.floor((startWX+endWX)/2));
      } else {
        const step=(endWX-startWX)/(n-1);
        for(let i=0;i<n;i++) this._obstacleSchedule.push(Math.floor(startWX+i*step));
      }
      // Enforce 400px minimum between consecutive obstacles
      for(let i=1;i<this._obstacleSchedule.length;i++){
        if(this._obstacleSchedule[i]-this._obstacleSchedule[i-1]<400)
          this._obstacleSchedule[i]=this._obstacleSchedule[i-1]+400;
      }
      // Coin at midpoint between each consecutive pair (shifted slightly forward to clear obstacle A)
      this._coinSchedule=[];
      for(let i=0;i<this._obstacleSchedule.length-1;i++){
        const mid=Math.floor((this._obstacleSchedule[i]+this._obstacleSchedule[i+1])/2);
        this._coinSchedule.push(mid);
      }
      this._obstacleScheduleIdx=0;
      this._coinScheduleIdx=0;
    }
    this._laserGapToggle=true;
    this._lastLaserWorldX=-9999;
    this._lastGateWorldX=-9999;
    // Hearts / extra lives
    this._hearts=1; this._maxHearts=2;
    this._invincible=false; this._invincibleTimer=0;
    this._heartPickupSpawned=false;
    this._heartPickupWX=(this.levelIndex>=4)?Math.floor(this.lvl.distance*0.70):-1;
    // Lava mechanics
    this._rocks=[];
    this._lavaGfx=null;
    if(this.theme.style==='lava'&&this.levelIndex>=1){
      this._lavaGfx=this.add.graphics().setDepth(14);
      this._lavaWave={phase:'idle',timer:7+Math.random()*4,height:0};
      this._rockTimer=5+Math.random()*4;
    }
    this._levelFlips=0; this._rareCoins=0;
    this.fireballs=[]; this._fireballTimer=2.0;
    this._currentTimer=2.5; this._currentDuration=0; this._currentBoost=0;
    this._windTimer=3.0; this._windDuration=0; this._windForce=0;

    this.cloudList=[];

    this.obstacles=this.add.group();
    this.coins=this.add.group();
    this.particles=this.add.group();
    this.stars=this.add.group();

    this._buildStars(); this._buildWallGfx(); this._buildPlayer();
    this._buildUI(); this._buildFinishLine(); this._buildInputs();
    this._showIntro();
    AUDIO.startMusic(this.levelIndex);
  }

  _buildStars(){
    for(let i=0;i<60;i++){
      const s=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(TUNNEL_TOP+4,TUNNEL_BOTTOM-4),'star')
        .setAlpha(Math.random()*0.4+0.1).setDepth(0);
      s.scrollX=Math.random()*0.3+0.05; this.stars.add(s);
    }
  }

  _buildWallGfx(){this.wallGfx=this.add.graphics().setDepth(5); this._drawWalls(0,0);}
  _drawWalls(off,time){
    const g=this.wallGfx,t=this.theme; g.clear();
    g.fillStyle(t.wallFill); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    switch(t.style){
      case 'lava':    this._wLava(g,t,off,time);    break;
      case 'ice':     this._wIce(g,t,off,time);     break;
      case 'cyber':   this._wCyber(g,t,off,time);   break;
      case 'void':    this._wVoid(g,t,off,time);    break;
      case 'ocean':   this._wOcean(g,t,off,time);   break;
      case 'sky':     this._wSky(g,t,off,time);     break;
      case 'factory': this._wFactory(g,t,off,time); break;
      default:        this._wNeon(g,t,off,time);    break;
    }
    // Always: bright tunnel border + inner glow
    g.lineStyle(3,t.wallLine,1);
    g.beginPath();g.moveTo(0,TUNNEL_TOP);g.lineTo(W,TUNNEL_TOP);g.strokePath();
    g.beginPath();g.moveTo(0,TUNNEL_BOTTOM);g.lineTo(W,TUNNEL_BOTTOM);g.strokePath();
    g.lineStyle(14,t.wallGlow,0.35);
    g.beginPath();g.moveTo(0,TUNNEL_TOP);g.lineTo(W,TUNNEL_TOP);g.strokePath();
    g.beginPath();g.moveTo(0,TUNNEL_BOTTOM);g.lineTo(W,TUNNEL_BOTTOM);g.strokePath();
  }

  // ── NEON CITY: cyan grid + city building silhouettes ──────────────────────
  _wNeon(g,t,off,time){
    g.lineStyle(1,t.wallLine,0.14);
    for(let x=-(off%40);x<W;x+=40){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    for(let y=0;y<TUNNEL_TOP;y+=20){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();}
    for(let y=TUNNEL_BOTTOM;y<H;y+=20){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();}
    // Building skyline — deterministic height from world column index
    const BW=64;
    for(let i=-1;i<=Math.ceil(W/BW)+1;i++){
      const wi=((Math.floor(off/BW)+i)&0x7f);
      const bx=i*BW-(off%BW);
      const bh=16+(wi*2371+wi*wi*13)%5*9;
      g.fillStyle(0x1a0044,1); g.fillRect(bx+1,TUNNEL_TOP-bh,BW-2,bh);
      const bh2=10+(wi*1847+wi*wi*7)%4*8;
      g.fillRect(bx+1,TUNNEL_BOTTOM,BW-2,bh2);
    }
    g.fillStyle(t.wallLine,0.07+Math.sin(time*0.0015)*0.03);
    g.fillRect(0,TUNNEL_TOP-10,W,10); g.fillRect(0,TUNNEL_BOTTOM,W,10);
  }

  // ── LAVA CAVE: rocky cracks + animated drips ──────────────────────────────
  _wLava(g,t,off,time){
    g.fillStyle(0x2a0600,1); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    g.lineStyle(1,0xff4400,0.22);
    for(let x=-(off%55);x<W;x+=55){
      const jag=Math.sin(x*0.09)*7;
      g.beginPath();g.moveTo(x,0);g.lineTo(x+jag,TUNNEL_TOP/2);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x+4,TUNNEL_BOTTOM);g.lineTo(x+jag-4,TUNNEL_BOTTOM+(H-TUNNEL_BOTTOM)/2);g.lineTo(x+4,H);g.strokePath();
    }
    // Animated lava drips hanging from top, bubbling from bottom
    g.lineStyle(0);
    for(let x=4;x<W;x+=20){
      const dh=5+Math.sin(time*0.0014+x*0.11+off*0.008)*4;
      g.fillStyle(0xff5500,0.75); g.fillRect(x,TUNNEL_TOP,4,dh);
      g.fillStyle(0xff8800,0.5);  g.fillRect(x+1,TUNNEL_TOP,2,dh-1);
    }
    for(let x=12;x<W;x+=20){
      const dh=4+Math.sin(time*0.0017+x*0.09+off*0.007)*3;
      g.fillStyle(0xff4400,0.6); g.fillRect(x,TUNNEL_BOTTOM-dh,4,dh);
    }
    g.fillStyle(0xff6600,0.08+Math.sin(time*0.003)*0.04);
    g.fillRect(0,TUNNEL_TOP-14,W,14); g.fillRect(0,TUNNEL_BOTTOM,W,14);
  }

  // ── ICE TUNNEL: crystal facets + icicles ─────────────────────────────────
  _wIce(g,t,off,time){
    g.lineStyle(1,0x88ccff,0.18);
    for(let x=-(off%36);x<W+36;x+=36){
      g.beginPath();g.moveTo(x,0);g.lineTo(x+20,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x-20,H);g.strokePath();
    }
    g.lineStyle(1,0xaaddff,0.10);
    for(let x=-(off%48)+24;x<W+48;x+=48){
      g.beginPath();g.moveTo(x,0);g.lineTo(x-20,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x+20,H);g.strokePath();
    }
    // Frost bands
    g.fillStyle(0xaaddff,0.04);
    for(let y=0;y<TUNNEL_TOP;y+=14){g.fillRect(0,y,W,7);}
    for(let y=TUNNEL_BOTTOM;y<H;y+=14){g.fillRect(0,y,W,7);}
    // Icicles hanging from top + pointing up from bottom
    g.lineStyle(0);
    for(let x=4;x<W;x+=18){
      const ih=4+Math.sin(x*0.066)*3;
      g.fillStyle(0xbbeeFF,0.65); g.fillTriangle(x,TUNNEL_TOP,x+4,TUNNEL_TOP,x+2,TUNNEL_TOP+ih);
      const ih2=3+Math.sin(x*0.071+1.3)*2;
      g.fillTriangle(x+9,TUNNEL_BOTTOM,x+13,TUNNEL_BOTTOM,x+11,TUNNEL_BOTTOM-ih2);
    }
    g.fillStyle(0xffffff,0.05+Math.sin(time*0.0022)*0.03);
    g.fillRect(0,TUNNEL_TOP-8,W,8); g.fillRect(0,TUNNEL_BOTTOM,W,8);
  }

  // ── CYBER GRID: matrix rain columns ──────────────────────────────────────
  _wCyber(g,t,off,time){
    g.lineStyle(1,0x003800,0.55);
    for(let x=-(off%18);x<W;x+=18){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    const t1=time*0.0028;
    for(let col=0;col<=Math.ceil(W/18);col++){
      const cx=col*18-(off%18);
      const ry=((t1*70+col*53)%TUNNEL_TOP+TUNNEL_TOP)%TUNNEL_TOP;
      g.fillStyle(0x00ff44,0.75); g.fillRect(cx,ry,3,4);
      g.fillStyle(0x00ff44,0.22); g.fillRect(cx,(ry-6+TUNNEL_TOP)%TUNNEL_TOP,3,3);
      const ry2=TUNNEL_BOTTOM+((t1*55+col*41)%(H-TUNNEL_BOTTOM));
      if(ry2<H){g.fillStyle(0x00ff44,0.65); g.fillRect(cx,ry2,3,4);}
    }
    g.fillStyle(0x00ff44,0.09+Math.sin(time*0.009)*0.05);
    g.fillRect(0,TUNNEL_TOP-5,W,5); g.fillRect(0,TUNNEL_BOTTOM,W,5);
  }

  // ── SPACE VOID: nebula haze + metallic grid + twinkling wall stars ────────
  _wVoid(g,t,off,time){
    g.lineStyle(1,0x444466,0.22);
    for(let x=-(off%32);x<W;x+=32){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    const nbA=0.05+Math.sin(time*0.0014)*0.025;
    g.lineStyle(0);
    g.fillStyle(0x8844cc,nbA);
    for(let y=0;y<TUNNEL_TOP;y+=10){const w2=W*0.55+Math.sin(y*0.22+off*0.003)*38;g.fillRect((W-w2)/2,y,w2,5);}
    g.fillStyle(0x4488ff,nbA*0.75);
    for(let y=TUNNEL_BOTTOM;y<H;y+=10){const w2=W*0.45+Math.sin(y*0.19+off*0.0028)*32;g.fillRect((W-w2)/2,y,w2,5);}
    // Twinkling wall stars
    const seed=Math.floor(off/64);
    for(let i=0;i<9;i++){
      const sx2=((i*137+seed*31)%W+W)%W;
      const syT=2+((i*89+seed*17)%(TUNNEL_TOP-4));
      const syB=TUNNEL_BOTTOM+2+((i*71+seed*23)%(H-TUNNEL_BOTTOM-4));
      const blink=0.35+0.5*Math.sin(time*0.002+i*1.7);
      g.fillStyle(0xaaaacc,blink); g.fillRect(sx2,syT,2,2); g.fillRect(sx2,syB,2,2);
    }
    g.fillStyle(0x8888cc,0.06+Math.sin(time*0.002)*0.03);
    g.fillRect(0,TUNNEL_TOP-8,W,8); g.fillRect(0,TUNNEL_BOTTOM,W,8);
  }

  // ── DEEP OCEAN: bioluminescent coral + light rays + seaweed ─────────────
  _wOcean(g,t,off,time){
    // Deep water gradient wash
    g.fillStyle(0x001a33,1); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    // Animated light rays from surface
    const rayA=0.04+Math.sin(time*0.0008)*0.02;
    for(let i=0;i<5;i++){
      const rx=(i*W/4.5+off*0.18)%W;
      const rw=6+Math.sin(time*0.0012+i*1.4)*3;
      g.fillStyle(0x0088ff,rayA);
      g.fillRect(rx-rw/2,0,rw,TUNNEL_TOP);
      g.fillStyle(0x0066cc,rayA*0.5);
      g.fillRect(rx-rw*1.5,0,rw*0.5,TUNNEL_TOP);
    }
    // Seaweed on floor wall — wavy columns
    g.lineStyle(2,0x00cc66,0.55);
    for(let x=-(off%38)%38+10;x<W;x+=38){
      const baseY=TUNNEL_BOTTOM;
      g.beginPath(); g.moveTo(x,baseY);
      for(let seg=0;seg<6;seg++){
        const sy=baseY+(seg+1)*(H-TUNNEL_BOTTOM)/6;
        const sx=x+Math.sin(time*0.0016+x*0.04+seg*0.8)*5;
        g.lineTo(sx,sy);
      }
      g.strokePath();
    }
    // Ceiling coral — stubby blobs
    const seed=Math.floor(off/52);
    for(let i=0;i<7;i++){
      const cx=((i*97+seed*43)%W+W)%W;
      const ch=4+((i*31+seed*11)%7);
      g.fillStyle(i%2===0?0xff4488:0x44ffaa,0.7);
      g.fillRect(cx-3,TUNNEL_TOP-ch,6,ch);
      g.fillRect(cx-5,TUNNEL_TOP-ch-3,10,3);
    }
    // Bioluminescent glow strip
    g.fillStyle(0x0055ff,0.07+Math.sin(time*0.0022)*0.03);
    g.fillRect(0,TUNNEL_TOP-6,W,6); g.fillRect(0,TUNNEL_BOTTOM,W,6);
  }

  // ── SKY HIGH: drifting clouds in walls + sun rays + horizon band ─────────
  _wSky(g,t,off,time){
    // Bright sky base
    g.fillStyle(0x5599cc,1); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    // Horizon glow band
    g.fillStyle(0xffeedd,0.18); g.fillRect(0,TUNNEL_TOP-6,W,6);
    g.fillStyle(0xffcc88,0.1);  g.fillRect(0,TUNNEL_BOTTOM,W,6);
    // Sun rays — radiating from top-left
    const sunA=0.05+Math.sin(time*0.0007)*0.02;
    for(let i=0;i<6;i++){
      const angle=-0.15+i*0.08;
      const len=TUNNEL_TOP*1.2;
      g.fillStyle(0xfffacc,sunA*(1-i*0.12));
      g.fillRect(20+i*12,0,4,TUNNEL_TOP);
    }
    // Fluffy clouds in top wall zone
    const coff=off*0.4;
    for(let c=0;c<4;c++){
      const cx=((c*160+coff)%(W+80))-40;
      const cy=6+c*7+Math.sin(time*0.001+c)*3;
      const cw=50+c*15; const ch2=14+c*3;
      g.fillStyle(0xffffff,0.22+c*0.04);
      g.fillRect(cx,cy,cw,ch2);
      g.fillRect(cx+8,cy-6,cw-16,8);
      g.fillRect(cx+cw*0.35,cy-9,cw*0.3,8);
    }
    // Bottom-wall distant clouds (lighter)
    for(let c=0;c<3;c++){
      const cx=((c*200+coff*0.7+90)%(W+80))-40;
      const cy=TUNNEL_BOTTOM+5+c*6;
      const cw=60+c*10;
      g.fillStyle(0xeeeeff,0.16);
      g.fillRect(cx,cy,cw,12);
      g.fillRect(cx+10,cy-5,cw-20,7);
    }
    // Sky glow edge
    g.fillStyle(0xaaddff,0.12+Math.sin(time*0.0018)*0.04);
    g.fillRect(0,TUNNEL_TOP-5,W,5); g.fillRect(0,TUNNEL_BOTTOM,W,5);
  }

  // ── CYBER FACTORY: metal plates + rivets + warning stripes ──────────────
  _wFactory(g,t,off,time){
    // Dark corrugated metal base
    g.fillStyle(0x111108,1); g.fillRect(0,0,W,TUNNEL_TOP); g.fillRect(0,TUNNEL_BOTTOM,W,H-TUNNEL_BOTTOM);
    // Horizontal plate seams
    g.lineStyle(1,0x333322,0.6);
    for(let y=0;y<TUNNEL_TOP;y+=14){
      g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();
    }
    for(let y=TUNNEL_BOTTOM;y<H;y+=14){
      g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.strokePath();
    }
    // Vertical plate seams
    g.lineStyle(1,0x2a2a18,0.4);
    for(let x=-(off%56)%56;x<W;x+=56){
      g.beginPath();g.moveTo(x,0);g.lineTo(x,TUNNEL_TOP);g.strokePath();
      g.beginPath();g.moveTo(x,TUNNEL_BOTTOM);g.lineTo(x,H);g.strokePath();
    }
    // Warning stripes near tunnel edge
    const stripeW=10;
    for(let x=-(off*0.5%28)%28;x<W;x+=28){
      const a=0.55+Math.sin(time*0.003)*0.12;
      g.fillStyle(0xffaa00,a); g.fillRect(x,TUNNEL_TOP-stripeW,14,stripeW);
      g.fillStyle(0x111108,a); g.fillRect(x+14,TUNNEL_TOP-stripeW,14,stripeW);
      g.fillStyle(0xffaa00,a); g.fillRect(x,TUNNEL_BOTTOM,14,stripeW);
      g.fillStyle(0x111108,a); g.fillRect(x+14,TUNNEL_BOTTOM,14,stripeW);
    }
    // Rivets along plate edges
    const rseed=Math.floor(off/40);
    for(let i=0;i<8;i++){
      const rx=((i*73+rseed*29)%W+W)%W;
      g.fillStyle(0x888866,0.75);
      g.fillRect(rx-2,TUNNEL_TOP-18,4,4);
      g.fillRect(rx-2,TUNNEL_BOTTOM+14,4,4);
    }
    // Steam vent slots in wall
    const ventA=0.15+Math.sin(time*0.004)*0.1;
    for(let i=0;i<3;i++){
      const vx=((i*140+off*0.3)%(W+40))-20;
      g.fillStyle(0x88aaaa,ventA);
      g.fillRect(vx,TUNNEL_TOP-4,20,4);
      g.fillRect(vx+30,TUNNEL_BOTTOM,20,4);
    }
    // Amber glow near edges
    g.fillStyle(0xff6600,0.05+Math.sin(time*0.0025)*0.03);
    g.fillRect(0,TUNNEL_TOP-5,W,5); g.fillRect(0,TUNNEL_BOTTOM,W,5);
  }

  _buildPlayer(){
    const charId=localStorage.getItem('gf_char')||'ship';
    const texKey=this.textures.exists('char_'+charId)?'char_'+charId:'char_ship';
    this.player=this.add.image(PLAYER_X,H/2,texKey).setScale(2).setDepth(10);
    this.flipGfx=this.add.graphics().setDepth(12);
    this.shieldAura=this.add.graphics().setDepth(11);
    // Slowmo blue overlay — pure graphics, never touches camera or HTML layer
    this._slowmoOverlay=this.add.graphics().setDepth(23).setAlpha(0);
    this.trail=[];
    for(let i=0;i<6;i++) this.trail.push(this.add.image(PLAYER_X,H/2,texKey).setScale(2).setAlpha(0.09*(6-i)).setDepth(9));
    this.trailHist=Array(6).fill({x:PLAYER_X,y:H/2});
  }

  _buildFinishLine(){
    this.finishGfx=this.add.graphics().setDepth(8);
    this.finishTxt=this.add.text(0,TUNNEL_TOP-24,'\u2605 FINISH \u2605',{fontFamily:'"Press Start 2P"',fontSize:'14px',color:'#ffdd00',shadow:{x:2,y:2,color:'#663300',blur:0,fill:true}}).setOrigin(0.5,1).setDepth(9);
    this.finishPulse=0;
    this.unlockedMsg=this.add.text(W/2,H/2-60,'FINISH LINE UNLOCKED!',{fontFamily:'"Press Start 2P"',fontSize:'12px',color:'#00ff88',shadow:{x:2,y:2,color:'#005522',blur:0,fill:true}}).setOrigin(0.5).setDepth(25).setAlpha(0);
  }

  _buildUI(){
    const best=parseInt(localStorage.getItem('gf_best')||'0');
    // Shift score/best inward to clear corner button zones
    this.scoreTxt=this.add.text(32,10,'0',{fontFamily:'"Press Start 2P"',fontSize:'13px',color:'#00ffff'}).setDepth(20);
    this.bestTxt=this.add.text(W-32,10,`BEST ${best}`,{fontFamily:'"Press Start 2P"',fontSize:'11px',color:'#ffff00'}).setOrigin(1,0).setDepth(20);
    this.levelTxt=this.add.text(W/2,10,`LVL ${this.levelIndex+1} \u2022 ${this.theme.name}`,{fontFamily:'"Press Start 2P"',fontSize:'9px',color:'#ff88ff'}).setOrigin(0.5,0).setDepth(20);
    const pname=localStorage.getItem('gf_name')||'';
    if(pname)this.add.text(W/2,H-10,pname,{fontFamily:'"Press Start 2P"',fontSize:'7px',color:'#333'}).setOrigin(0.5,1).setDepth(20);
    this.coinTxt=this.add.text(10,30,`\u25c6 0/${this.lvl.required}`,{fontFamily:'"Press Start 2P"',fontSize:'14px',color:'#ffdd00'}).setDepth(20);
    this.heartsTxt=this.add.text(W-10,28,'',{fontFamily:'"Press Start 2P"',fontSize:'13px',color:'#ff4444'}).setOrigin(1,0).setDepth(20);
    this._updateHeartsHUD();
    this.progGfx=this.add.graphics().setDepth(20);
    this.powerupGfx=this.add.graphics().setDepth(20);
    this.powerupTxt=this.add.text(10,52,'',{fontFamily:'"Press Start 2P"',fontSize:'8px',color:'#00ff88'}).setDepth(20);
    // Mute — bottom-right (Phaser text, stays on canvas)
    this.muteBtn=this.add.text(W-12,H-12,AUDIO.muted?'[M]':'[S]',{fontFamily:'"Press Start 2P"',fontSize:'9px',color:AUDIO.muted?'#555555':'#00ffcc'}).setOrigin(1,1).setDepth(21).setInteractive();
    this.muteBtn.on('pointerdown',()=>{const m=AUDIO.toggleMute();this.muteBtn.setText(m?'[M]':'[S]').setColor(m?'#555555':'#00ffcc');});
    // HTML pause button — show layer, wire tap
    const _layer=document.getElementById('game-btn-layer');
    const _pbtn=document.getElementById('btn-pause');
    if(_layer){_layer.style.display='flex';}
    if(_pbtn){_pbtn.style.display='flex';addTap(_pbtn,()=>this._pause());}
    this.events.on('shutdown',()=>{
      const l=document.getElementById('game-btn-layer');if(l)l.style.display='none';
    });
    // Challenge HUD
    if(CHALLENGE.active){
      this.challengeTxt=this.add.text(W/2,28,`\u2694 ${CHALLENGE.name}: ${CHALLENGE.score}`,
        {fontFamily:'"Press Start 2P"',fontSize:'7px',color:'#ff88ff'}).setOrigin(0.5,0).setDepth(20);
    }
  }

  _buildInputs(){
    INPUT.on((pos)=>{
      if(pos.x>W-44&&pos.y>H-44)return;  // mute (bottom-right)
      if(this._paused)return;
      this._flip();
    });
    this.events.once('shutdown',()=>INPUT.clear());
    if(this.input.keyboard){
      this.input.keyboard.on('keydown-SPACE',this._flip,this);
      this.input.keyboard.on('keydown-UP',this._flip,this);
      this.input.keyboard.on('keydown-M',()=>{const m=AUDIO.toggleMute();this.muteBtn.setText(m?'[M]':'[S]').setColor(m?'#555555':'#00ffcc');});
      this.input.keyboard.on('keydown-P',()=>{this._paused?this._resume():this._pause();});
      this.input.keyboard.on('keydown-ESC',()=>{this._paused?this._resume():this._pause();});
    }
  }

  // ── Pause ──────────────────────────────────────────────────────────────────
  _pause(){
    if(this._paused||!this.alive||!this.gameStarted)return;
    this._paused=true;
    const pb=document.getElementById('btn-pause');if(pb)pb.style.display='none';
    AUDIO.pauseMusic();
    OV.show('ov-pause',
      `<div class="ov-wrap">
        <div class="ov-title" style="color:#00ffff">\u23f8 PAUSED</div>
        <hr class="ov-rule">
        <button class="ov-btn" id="ov-resume" style="margin-top:10px;border-color:#00ff88;color:#00ff88">\u25b6 RESUME</button>
        <button class="ov-btn ov-btn-sm" id="ov-pause-home" style="margin-top:4px">\u2190 MAIN MENU</button>
      </div>`,'rgba(0,0,8,0.92)');
    this.time.delayedCall(300,()=>{
      addTap(document.getElementById('ov-resume'),()=>this._resume());
      addTap(document.getElementById('ov-pause-home'),()=>{OV.hide();AUDIO.stopMusic();this._paused=false;this.scene.start('Menu');});
    });
  }
  _resume(){
    if(!this._paused)return;
    this._paused=false;
    OV.hide();
    const pb=document.getElementById('btn-pause');if(pb)pb.style.display='flex';
    AUDIO.resumeMusic();
  }

  // ── Level intro + countdown (HTML overlay) ─────────────────────────────────
  _showIntro(){
    const t=this.theme, l=this.lvl;
    OV.show('ov-intro',
      `<div class="ov-wrap">
        <div class="ov-sub" style="color:#888">LEVEL</div>
        <div class="ov-title" style="color:#ffff00;text-shadow:4px 4px #886600;font-size:clamp(44px,14vw,64px)">${this.levelIndex+1}</div>
        <div class="ov-sub" style="color:#ff88ff">${t.name}</div>
        <div class="ov-sub" style="color:#00ffff;margin:10px 0">${l.hint}</div>
        <div class="ov-sub" style="color:#ffdd00">COLLECT ${l.required} COINS TO FINISH</div>
        <button class="ov-btn" id="ov-play" style="margin-top:22px;border-color:#ffff00;color:#ffff00">\u25b6 TAP TO START</button>
        <button class="ov-btn ov-btn-sm" id="ov-intro-home" style="margin-top:4px">\u2190 MAIN MENU</button>
      </div>`,'rgba(0,0,8,0.86)');
    let started=false;
    const go=()=>{if(started)return;started=true;OV.hide();this._showPowerupSelect(()=>this._runCountdown());};
    const goHome=()=>{if(started)return;started=true;OV.hide();AUDIO.stopMusic();this.scene.start('Menu');};
    addTap(document.getElementById('ov-play'),go);
    addTap(document.getElementById('ov-intro-home'),goHome);
    if(this.input.keyboard)this.input.keyboard.once('keydown',go);
    this.time.delayedCall(4000,go);
  }

  _showPowerupSelect(cb){
    const inv=getInventory();
    const PUPS=[
      {type:'shield',name:'SHIELD',col:'#00ff88'},
      {type:'magnet',name:'MAGNET',col:'#ffdd00'},
      {type:'slowmo',name:'SLOW-MO',col:'#44ccff'},
      {type:'doublecoins',name:'2X COINS',col:'#aa44ff'},
    ];
    const hasAny=PUPS.some(p=>(inv[p.type]||0)>0);
    if(!hasAny){cb();return;}
    const btns=PUPS.map(p=>{
      const n=inv[p.type]||0;
      const dis=n===0;
      return `<button class="ov-btn${dis?' ov-btn-disabled':''}" id="pusel-${p.type}" style="border-color:${dis?'#333':p.col};color:${dis?'#333':p.col};margin:3px 0">${p.name} (${n})</button>`;
    }).join('');
    OV.show('ov-pusel',
      `<div class="ov-wrap">
        <div class="ov-sub" style="color:#888">OPTIONAL</div>
        <div class="ov-title" style="color:#00ffff;font-size:clamp(13px,4vw,18px)">CHOOSE POWER-UP</div>
        <div class="ov-sub" style="color:#555;margin-bottom:6px">VISIT SHOP TO BUY MORE</div>
        ${btns}
        <button class="ov-btn ov-btn-sm" id="pusel-skip" style="margin-top:8px">\u25b6 SKIP (NO POWER-UP)</button>
      </div>`,'rgba(0,0,12,0.95)');
    let chosen=false;
    const pick=(type)=>{
      if(chosen)return;chosen=true;
      if(type&&removeFromInventory(type))this._pendingPowerup=type;
      OV.hide();cb();
    };
    PUPS.forEach(p=>{if((inv[p.type]||0)>0)addTap(document.getElementById('pusel-'+p.type),()=>pick(p.type));});
    addTap(document.getElementById('pusel-skip'),()=>pick(null));
    if(this.input.keyboard)this.input.keyboard.once('keydown',()=>pick(null));
  }
  _runCountdown(){
    // Brief theme-colored wipe so each world transition feels distinct
    const wl=this.theme.wallLine;
    this.cameras.main.flash(320,(wl>>16)&0xff,(wl>>8)&0xff,wl&0xff,false);
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;';
    const num=document.createElement('div');
    num.style.cssText='font-family:"Press Start 2P",monospace;font-size:clamp(80px,26vw,120px);color:#fff;text-align:center;will-change:transform,opacity;';
    wrap.appendChild(num); document.body.appendChild(wrap);
    const steps=['3','2','1','GO!'], cols=['#ffffff','#ffffff','#ffffff','#00ff88'];
    let idx=0;
    const tick=()=>{
      if(idx>=steps.length){wrap.remove();if(this._pendingPowerup){this._activatePowerup(this._pendingPowerup);this._pendingPowerup=null;}this.gameStarted=true;return;}
      const isGo=idx===3;
      AUDIO.countBeep(isGo);
      num.textContent=steps[idx];
      num.style.color=cols[idx];
      num.style.fontSize=isGo?'clamp(58px,18vw,86px)':'clamp(80px,26vw,120px)';
      num.style.opacity='1'; num.style.transform='scale(1.5)';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{num.style.transition='transform 0.18s ease-out';num.style.transform='scale(1)';}));
      setTimeout(()=>{num.style.opacity='0';setTimeout(()=>{num.style.transition='';idx++;tick();},200);},isGo?400:550);
    };
    tick();
  }

  // ── Gravity flip ───────────────────────────────────────────────────────────
  _flip(){
    if(!this.alive||!this.gameStarted||this._paused) return;
    if(this.flipCooldown>0){this._inputBuf=INPUT_BUFFER;return;} // queue for later
    this._doFlip();
  }
  _doFlip(){
    this._inputBuf=0;
    this.flipCooldown=0.12;
    this.gravDir*=-1;
    this._levelFlips++;
    // Gentle push — preserves much of existing momentum, feels floaty
    this.vy=lerp(this.vy,this.gravDir*-FLIP_KICK,0.52);
    this.cameras.main.flash(45,20,60,160,false);
    // Expanding shockwave ring + directional arrow
    this._shockwave={r:4,maxR:58,color:this.theme.wallLine,x:this.player.x,y:this.player.y,dir:this.gravDir};
    // Squash & stretch: squeeze horizontal, elongate vertical in flip direction
    this.tweens.killTweensOf(this.player);
    this.player.setScale(2);
    this.tweens.add({targets:this.player,scaleX:1.0,scaleY:3.4,duration:72,yoyo:true,ease:'Sine.easeInOut'});
    // Directional particle burst — mostly in new gravity direction
    this._emitParticles(this.player.x,this.player.y,[0x00ffff,0xff44ff,0xffffff,0xffff00,0x44ffff],14,50,160);
    for(let i=0;i<8;i++){
      let p=this._poolParticle();
      if(!p){p=this.add.image(0,0,'particle').setDepth(15);this.particles.add(p);}
      p.setActive(true).setVisible(true);
      p.x=this.player.x;p.y=this.player.y;
      p.vx=(Math.random()-0.5)*38;
      p.vy=this.gravDir<0?-Phaser.Math.Between(80,200):-Phaser.Math.Between(-200,-80);
      p.life=0.58;p.setTint(this.theme.wallLine);p.setScale(2);
    }
    this.cameraShake=0.05;
    AUDIO.flip();
  }

  _emitParticles(px,py,colors,count,sMin=60,sMax=160){
    for(let i=0;i<count;i++){
      let p=this._poolParticle();
      if(!p){p=this.add.image(0,0,'particle').setDepth(15);this.particles.add(p);}
      p.setActive(true).setVisible(true);
      p.x=px;p.y=py;
      const a=(i/count)*Math.PI*2,s=Phaser.Math.Between(sMin,sMax);
      p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;
      p.life=1.0;p.setTint(colors[i%colors.length]);p.setScale(Phaser.Math.Between(1,3));
    }
  }
  _poolParticle(){for(const p of this.particles.getChildren())if(!p.active)return p;return null;}

  // ── Theme-specific ambient atmosphere particles ─────────────────────────
  _themeAmbient(dt,time){
    if(!this.gameStarted) return;
    this._ambientT+=dt;
    const style=this.theme.style;
    if(style==='lava'&&this._ambientT>0.22){
      this._ambientT=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(10,W-10);p.y=TUNNEL_BOTTOM-2;p.vx=(Math.random()-0.5)*16;p.vy=-Phaser.Math.Between(20,60);p.life=1.0;p.setTint(Math.random()<0.6?0xff8800:0xff4400);p.setScale(Phaser.Math.Between(1,2));}
    } else if(style==='ice'&&this._ambientT>0.3){
      this._ambientT=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(10,W-10);p.y=TUNNEL_TOP+2;p.vx=(Math.random()-0.5)*10;p.vy=Phaser.Math.Between(14,38);p.life=1.3;p.setTint(0xaaddff);p.setScale(1);}
    } else if(style==='neon'&&this._ambientT>0.45){
      this._ambientT=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(0,W);p.y=Math.random()<0.5?Phaser.Math.Between(0,TUNNEL_TOP):Phaser.Math.Between(TUNNEL_BOTTOM,H);p.vx=(Math.random()-0.5)*18;p.vy=(Math.random()-0.5)*18;p.life=0.7;p.setTint(Math.random()<0.5?0x00ccff:0xaa44ff);p.setScale(1);}
    } else if(style==='ocean'&&this._ambientT>0.18){
      this._ambientT=0;
      // Bubbles rise upward from floor
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(10,W-10);p.y=TUNNEL_BOTTOM-4;p.vx=(Math.random()-0.5)*8;p.vy=-Phaser.Math.Between(18,55);p.life=1.6;p.setTint(Math.random()<0.5?0x0088ff:0x00ffee);p.setScale(Math.random()<0.5?1:2);}
    } else if(style==='sky'&&this._ambientT>0.55){
      this._ambientT=0;
      // Birds — tiny fast dots
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=W+4;p.y=Phaser.Math.Between(TUNNEL_TOP+10,TUNNEL_BOTTOM-10);p.vx=-(Phaser.Math.Between(70,140));p.vy=(Math.random()-0.5)*12;p.life=1.2;p.setTint(0x444444);p.setScale(1);}
    } else if(style==='factory'&&this._ambientT>0.25){
      this._ambientT=0;
      // Steam/sparks from walls
      const fromTop=Math.random()<0.5;
      let p=this._poolParticle();
      const isSpark=Math.random()<0.35;
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(20,W-20);p.y=fromTop?TUNNEL_TOP+4:TUNNEL_BOTTOM-4;p.vx=(Math.random()-0.5)*(isSpark?45:18);p.vy=fromTop?Phaser.Math.Between(10,30):-Phaser.Math.Between(10,30);p.life=isSpark?0.45:1.1;p.setTint(isSpark?0xffaa00:(Math.random()<0.5?0xaaaaaa:0xdddddd));p.setScale(isSpark?1:Phaser.Math.Between(2,4));}
    } else if(style==='void'&&this._ambientT>0.35){
      this._ambientT=0;
      // Shooting stars — fast horizontal streaks
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=W+4;p.y=Phaser.Math.Between(2,TUNNEL_TOP-2);p.vx=-(Phaser.Math.Between(220,420));p.vy=(Math.random()-0.5)*18;p.life=0.55;p.setTint(Math.random()<0.5?0xffffff:0xaaaaee);p.setScale(Math.random()<0.3?1:2);}
      // Also occasional bottom-wall star
      let p2=this._poolParticle();
      if(p2){p2.setActive(true).setVisible(true);p2.x=W+4;p2.y=Phaser.Math.Between(TUNNEL_BOTTOM+2,H-2);p2.vx=-(Phaser.Math.Between(180,360));p2.vy=(Math.random()-0.5)*15;p2.life=0.5;p2.setTint(0xccccff);p2.setScale(1);}
    } else if(style==='cyber'&&this._ambientT>0.22){
      this._ambientT=0;
      // Matrix fragments — green glyphs raining from ceiling
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=Phaser.Math.Between(0,W);p.y=TUNNEL_TOP+2;p.vx=(Math.random()-0.5)*6;p.vy=Phaser.Math.Between(60,140);p.life=0.8;p.setTint(Math.random()<0.6?0x00ff44:0x00cc33);p.setScale(Math.random()<0.4?2:1);}
      // Rising from floor too
      let p2=this._poolParticle();
      if(p2){p2.setActive(true).setVisible(true);p2.x=Phaser.Math.Between(0,W);p2.y=TUNNEL_BOTTOM-2;p2.vx=(Math.random()-0.5)*6;p2.vy=-Phaser.Math.Between(50,110);p2.life=0.7;p2.setTint(0x00ff44);p2.setScale(1);}
    }
  }

  // ── Obstacle spawning ───────────────────────────────────────────────────────
  _w2s(wx){return PLAYER_X+(wx-this.distTraveled);}
  _spawnCluster(wx){
    const lvl=this.lvl, sx=this._w2s(wx);
    this._spawnCount++;
    // Weighted type selection
    let pick='barrier';
    if(lvl.weights){
      const entries=Object.entries(lvl.weights);
      const total=entries.reduce((s,[,w])=>s+w,0);
      let r=Math.random()*total;
      for(const [type,w] of entries){r-=w;if(r<=0){pick=type;break;}}
    } else if(lvl.types){
      const t=lvl.types; pick=t[Math.floor(Math.random()*t.length)];
    }
    if(pick==='barrier')this._doBarrier(sx,wx);
    else if(pick==='spike')this._doSpikes(sx,wx);
    else if(pick==='moving')this._doMoving(sx,wx);
    else if(pick==='laser')this._doLaser(sx,wx);
    else if(pick==='gravitygate')this._doGravityGate(sx,wx);
    else if(pick==='gauntlet'){this._doSpikes(sx,wx);this._doBarrier(sx+90,wx+90);}
  }

  _doBarrier(sx,wx){
    const gapH=this.lvl.gap, gapY=Phaser.Math.Between(TUNNEL_TOP+24,TUNNEL_BOTTOM-gapH-24), bh=24;
    for(let y=TUNNEL_TOP;y<gapY;y+=bh){
      const b=this.add.image(sx,y+bh/2,'block').setDepth(6).setTint(this.theme.blockTint);
      b.obstacleType='barrier';this.obstacles.add(b);
    }
    for(let y=gapY+gapH;y<TUNNEL_BOTTOM;y+=bh){
      const b=this.add.image(sx,y+bh/2,'block').setDepth(6).setTint(this.theme.blockTint);
      b.obstacleType='barrier';this.obstacles.add(b);
    }
  }

  _doSpikes(sx,wx){
    const maxTop=clamp(1+Math.floor(this.levelIndex*0.6),1,4);
    const numTop=Phaser.Math.Between(1,maxTop);
    const addBot=this.levelIndex>=2&&Math.random()<0.5;
    const numBot=addBot?Phaser.Math.Between(1,clamp(1+Math.floor(this.levelIndex*0.35),1,3)):0;
    const sp=18;
    for(let i=0;i<numTop;i++){
      const s=this.add.image(sx+i*sp,TUNNEL_TOP+6,'spike').setDepth(6).setTint(this.theme.spikeTint);
      s.obstacleType='spike';this.obstacles.add(s);
    }
    for(let i=0;i<numBot;i++){
      const s=this.add.image(sx+i*sp,TUNNEL_BOTTOM-6,'spike_up').setDepth(6).setTint(this.theme.spikeTint);
      s.obstacleType='spike';this.obstacles.add(s);
    }
  }

  _doMoving(sx,wx){
    const isIce=this.theme.style==='ice';
    const scaleX=isIce?0.45:1.6, scaleY=isIce?2.8:1.6;
    const tint=isIce?0x99eeff:this.theme.blockTint;
    const b=this.add.image(sx,H/2,'block').setScale(scaleX,scaleY).setDepth(6).setTint(tint);
    b.obstacleType='moving';
    b.moveSpeed=lerp(isIce?150:60,isIce?260:170,this.levelIndex/7)*(Math.random()>0.5?1:-1);
    if(this.levelIndex>=5)b.moveSpeed*=0.65;
    b.minY=TUNNEL_TOP+24;b.maxY=TUNNEL_BOTTOM-24;
    this.obstacles.add(b);
  }

  _doLaser(sx,wx){
    // Spacing: never within 500px of another laser or 400px after a gravity gate
    if(wx-this._lastLaserWorldX<500)return;
    if(wx-this._lastGateWorldX<400)return;
    this._lastLaserWorldX=wx;
    const d=this.levelIndex/11;
    const gfx=this.add.graphics().setDepth(7);
    // Safe gap alternates top/bottom so player can predict where to dodge
    const gapTop=this._laserGapToggle;
    this._laserGapToggle=!this._laserGapToggle;
    const safeHint=gapTop?'\u2191 SAFE UP':'\u2193 SAFE DOWN';
    const dangerTxt=this.add.text(sx,TUNNEL_TOP-14,'\u26a0 '+safeHint,{fontFamily:'"Press Start 2P"',fontSize:'8px',color:'#ff8800'}).setOrigin(0.5,1).setDepth(10).setVisible(false);
    // Fairer timing: 1s warn, 0.6s deadly, 1.5-2s off
    const warnDur=1.0, onDur=0.6, offDur=lerp(2.0,1.5,d);
    const totalPeriod=warnDur+onDur+offDur;
    this.laserList.push({
      gfx,txt:dangerTxt,x:sx,warnDur,onDur,offDur,totalPeriod,
      t:Math.random()*totalPeriod,_lastPhase:'off',_buzzTimer:0,gapTop,
    });
  }

  _placeZoneCoin(wx){
    const sx=this._w2s(wx);
    const midY=H/2;
    const candidates=[midY,midY-100,midY+100,midY-160,midY+160,TUNNEL_TOP+120,TUNNEL_BOTTOM-120];
    for(const cy of candidates){
      const clamped=clamp(cy,TUNNEL_TOP+110,TUNNEL_BOTTOM-110);
      let blocked=false;
      for(const obs of this.obstacles.getChildren()){
        if(Math.abs(obs.x-sx)<200&&Math.abs(obs.y-clamped)<200){blocked=true;break;}
      }
      if(!blocked){for(const laser of this.laserList){if(Math.abs(laser.x-sx)<200){blocked=true;break;}}}
      if(!blocked){for(const c of this.coins.getChildren()){if(Math.abs(c.x-sx)<80&&Math.abs(c.y-clamped)<80){blocked=true;break;}}}
      if(!blocked){
        const r=Math.random();
        let tex='coin',isRare=false,isPowerup=false,powerupType=null;
        if(r<0.08&&!this._powerup){
          isPowerup=true;const types=['shield','magnet','slowmo','doublecoins'];
          powerupType=types[Math.floor(Math.random()*types.length)];
          const texMap={shield:'powerup_shield',magnet:'powerup_magnet',slowmo:'powerup_slowmo',doublecoins:'powerup_doublecoins'};
          tex=texMap[powerupType];
        } else if(r<0.22){isRare=true;tex='coin_rare';}
        const c=this.add.image(sx,clamped,tex).setDepth(7).setScale(isPowerup?1.7:isRare?1.6:1.5);
        c.bobOffset=Math.random()*Math.PI*2;c.worldX=wx;
        c.isRare=isRare;c.isPowerup=isPowerup;c.powerupType=powerupType;
        this.coins.add(c);return;
      }
    }
    // Fallback: place at midY unchecked
    const c=this.add.image(sx,midY,'coin').setDepth(7).setScale(1.5);
    c.bobOffset=Math.random()*Math.PI*2;c.worldX=wx;c.isRare=false;c.isPowerup=false;c.powerupType=null;
    this.coins.add(c);
  }

  _isCoinBlocked(sx,sy,isPowerup){
    sy=clamp(sy,TUNNEL_TOP+100,TUNNEL_BOTTOM-100);
    const buf=isPowerup?70:55;
    // Blocked by solid obstacle
    for(const obs of this.obstacles.getChildren()){
      if(Math.abs(obs.x-sx)<obs.displayWidth/2+buf&&Math.abs(obs.y-sy)<obs.displayHeight/2+buf)return true;
    }
    // Too close to a laser
    for(const laser of this.laserList){if(Math.abs(laser.x-sx)<58)return true;}
    // Too close to a gravity gate
    for(const gate of this.gateList){if(Math.abs(gate.x-sx)<32)return true;}
    // Too close to an already-placed coin (prevent stacking)
    for(const c of this.coins.getChildren()){
      if(Math.abs(c.x-sx)<34&&Math.abs(c.y-sy)<34)return true;
    }
    return false;
  }

  _placeCoin(sx,sy,wx){
    // Determine pickup type first
    const r=Math.random();
    let tex='coin',isRare=false,isPowerup=false,powerupType=null;
    if(r<0.065&&!this._powerup){
      isPowerup=true;
      const types=['shield','magnet','slowmo','doublecoins'];
      powerupType=types[Math.floor(Math.random()*types.length)];
      const texMap={shield:'powerup_shield',magnet:'powerup_magnet',slowmo:'powerup_slowmo',doublecoins:'powerup_doublecoins'};
      tex=texMap[powerupType];
    } else if(r<0.18){
      isRare=true; tex='coin_rare';
    }
    // Try the requested Y, then two alternative Y positions before giving up
    const midY=H/2;
    const candidates=[sy,midY,midY+(sy<midY?80:-80)];
    for(const cy of candidates){
      const clamped=clamp(cy,TUNNEL_TOP+100,TUNNEL_BOTTOM-100);
      if(!this._isCoinBlocked(sx,clamped,isPowerup)){
        const c=this.add.image(sx,clamped,tex).setDepth(7).setScale(isPowerup?1.7:isRare?1.6:1.5);
        c.bobOffset=Math.random()*Math.PI*2; c.worldX=wx;
        c.isRare=isRare; c.isPowerup=isPowerup; c.powerupType=powerupType;
        this.coins.add(c);
        return;
      }
    }
    // All candidates blocked — skip this coin
  }

  // ── Finish line ────────────────────────────────────────────────────────────
  _updateFinishLine(){
    const sx=PLAYER_X+(this.lvl.distance-this.distTraveled);
    this.finishTxt.x=sx;
    if(this.unlockedMsg.alpha>0)this.unlockedMsg.setAlpha(Math.max(0,this.unlockedMsg.alpha-0.025));
    this.finishPulse=(this.finishPulse+0.08)%(Math.PI*2);
    const pulse=0.6+Math.sin(this.finishPulse)*0.4;
    const locked=this.coinsCollected<this.lvl.required;
    const lc=locked?0xff3333:0xffdd00;
    const g=this.finishGfx;g.clear();
    // Far-visibility beacon: glow at right edge before line enters screen
    if(sx>W-30&&sx<W+500){
      const edge=Math.min(sx,W-1);
      const farA=clamp((W+500-sx)/500,0,1)*pulse*0.5;
      g.lineStyle(80,lc,farA*0.22);g.beginPath();g.moveTo(edge,TUNNEL_TOP);g.lineTo(edge,TUNNEL_BOTTOM);g.strokePath();
      g.lineStyle(30,lc,farA*0.45);g.beginPath();g.moveTo(edge,TUNNEL_TOP);g.lineTo(edge,TUNNEL_BOTTOM);g.strokePath();
    }
    if(sx<-20||sx>W+20)return;
    // Checkered flag: 2-column pattern, full tunnel height
    const sqH=20,sqW=16;
    for(let y=TUNNEL_TOP;y<TUNNEL_BOTTOM;y+=sqH){
      const row=Math.floor((y-TUNNEL_TOP)/sqH);
      for(let col=0;col<2;col++){
        const white=(row+col)%2===0;
        g.fillStyle(white?0xffffff:0x111111,pulse*0.92);
        g.fillRect(sx-sqW+col*sqW,y,sqW,sqH);
      }
    }
    // Gold/red border line
    g.lineStyle(3,lc,pulse);g.beginPath();g.moveTo(sx,TUNNEL_TOP);g.lineTo(sx,TUNNEL_BOTTOM);g.strokePath();
    // Wide area glow
    g.lineStyle(28,lc,pulse*0.28);g.beginPath();g.moveTo(sx,TUNNEL_TOP);g.lineTo(sx,TUNNEL_BOTTOM);g.strokePath();
    g.lineStyle(60,lc,pulse*0.09);g.beginPath();g.moveTo(sx,TUNNEL_TOP);g.lineTo(sx,TUNNEL_BOTTOM);g.strokePath();
    // Flash finish text
    this.finishTxt.setAlpha(0.65+0.35*Math.sin(this.finishPulse*4));
    if(sx<=PLAYER_X+8&&!this.levelDone)this._completeLEVEL();
  }

  // ── Update ─────────────────────────────────────────────────────────────────
  update(time,delta){
    if(!this.alive||this._paused)return;
    const dt=delta/1000;

    this.coins.getChildren().forEach(c=>{
      c.y+=Math.sin(time*0.003+c.bobOffset)*0.4;
      if(c.isPowerup&&c.powerupType==='doublecoins'){
        c.setScale(2.0+Math.sin(time*0.006+c.bobOffset)*0.35);
        if(Math.random()<dt*2.5)this._emitParticles(c.x+(Math.random()-0.5)*16,c.y+(Math.random()-0.5)*16,[0xaa44ff,0xdd88ff,0xffffff],2,30,110);
      } else {
        c.setScale(c.isPowerup?1.65+Math.sin(time*0.004+c.bobOffset)*0.15:1.4+Math.sin(time*0.004+c.bobOffset)*0.1);
      }
    });
    if(!this.gameStarted)return;

    this.flipCooldown=Math.max(0,this.flipCooldown-dt);
    this._closeCallCooldown=Math.max(0,this._closeCallCooldown-dt);
    // Input buffer: fire queued flip as soon as cooldown clears
    if(this._inputBuf>0){
      this._inputBuf=Math.max(0,this._inputBuf-dt);
      if(this.flipCooldown<=0)this._doFlip();
    }
    // Invincibility frames (hearts extra life)
    if(this._invincible){
      this._invincibleTimer=Math.max(0,this._invincibleTimer-dt);
      this.player.setAlpha(Math.sin(this._invincibleTimer*22)>0?1:0.2);
      if(this._invincibleTimer<=0){
        this._invincible=false;
        this.player.setAlpha(1);
      }
    }
    const prog=clamp(this.distTraveled/this.lvl.distance,0,1);
    this.speed=this.lvl.startSpeed;
    if(this._powerup?.type==='slowmo') this.speed*=0.70;
    this.distTraveled+=this.speed*dt;
    this.levelScore=Math.floor(this.distTraveled/8);
    const currentScore=this.totalScore+this.levelScore;
    this.scoreTxt.setText(`${currentScore}`);
    if(CHALLENGE.active&&!this._challengeBeat&&currentScore>=CHALLENGE.score){
      this._challengeBeat=true;
      if(this.challengeTxt)this.challengeTxt.setColor('#00ff88');
      this._floatText(W/2,H/2-40,'\u2694 CHALLENGE BEATEN!','#00ff88');
      this.cameras.main.flash(200,0,255,100,false);
    }

    // World-specific mechanics
    const style=this.theme.style;
    // Ocean: water current speed bursts
    if(style==='ocean'){
      this._currentTimer-=dt;
      if(this._currentTimer<=0){
        this._currentTimer=3+Math.random()*4;
        this._currentBoost=(Math.random()>0.5?1:-1)*(35+Math.random()*45);
        this._currentDuration=1.0+Math.random()*0.8;
        this._floatText(W/2,H/2-28,this._currentBoost>0?'\u27a1 CURRENT':'\u2b05 CURRENT','#00aaff');
      }
      if(this._currentDuration>0){this._currentDuration-=dt;}
    }
    // Sky: wind drifts player vertically
    if(style==='sky'){
      this._windTimer-=dt;
      if(this._windTimer<=0){
        this._windTimer=4+Math.random()*4;
        this._windForce=(Math.random()>0.5?1:-1)*(45+Math.random()*55);
        this._windDuration=1.4+Math.random();
        this._floatText(W/2,H/2-28,this._windForce>0?'\u2b07 WIND':'\u2b06 WIND','#aaddff');
      }
      if(this._windDuration>0){this._windDuration-=dt;if(this._windDuration<=0)this._windForce=0;}
    }
    // Gentle gravity (ocean has reduced gravity)
    const gravMult=style==='ocean'?0.62:1.0;
    this.vy+=GRAVITY_FORCE*this.gravDir*dt*gravMult;
    // Sky wind applies vertical drift
    if(style==='sky'&&this._windForce!==0)this.vy+=this._windForce*dt;
    this.vy=clamp(this.vy,-VEL_MAX,VEL_MAX);
    this.player.y+=this.vy*dt;
    this.player.setRotation(clamp(this.vy*0.0007,-0.3,0.3));

    this.trailHist.unshift({x:this.player.x,y:this.player.y});
    this.trailHist=this.trailHist.slice(0,6);
    this.trail.forEach((t,i)=>{const h=this.trailHist[i]||this.trailHist[this.trailHist.length-1];t.x=h.x;t.y=h.y;t.setRotation(this.player.rotation);});

    // Engine trail
    this.trailTimer+=dt;
    if(this.trailTimer>0.038){
      this.trailTimer=0;
      let p=this._poolParticle();
      if(p){p.setActive(true).setVisible(true);p.x=this.player.x-10;p.y=this.player.y+(Math.random()-0.5)*5;p.vx=-30-Math.random()*45;p.vy=(Math.random()-0.5)*22;p.life=0.32;p.setTint(0x00ffff);p.setScale(1.4);}
    }

    const ph=this.player.displayHeight/2;
    if(this.player.y-ph<=TUNNEL_TOP||this.player.y+ph>=TUNNEL_BOTTOM){
      if(this._inputBuf>0){
        // Coyote grace: tap was queued — clamp player back and flip instead of dying
        this.player.y=clamp(this.player.y,TUNNEL_TOP+ph+1,TUNNEL_BOTTOM-ph-1);
        this._doFlip();
      } else {this._die();return;}
    }

    this.stars.getChildren().forEach(s=>{s.x-=this.speed*dt*s.scrollX;if(s.x<-2)s.x=W+2;});

    for(const obs of this.obstacles.getChildren().slice()){
      obs.x-=this.speed*dt;
      if(obs.obstacleType==='moving'){obs.y+=obs.moveSpeed*dt;if(obs.y<obs.minY||obs.y>obs.maxY)obs.moveSpeed*=-1;}
      if(this._aabb(this.player,obs)){this._die();return;}
      if(!this._nearMissObstacles.has(obs)&&this._nearMissCheck(this.player,obs)){
        this._nearMissObstacles.add(obs);
        this._triggerNearMiss(obs);
      }
      if(obs.x<-60){this._nearMissObstacles.delete(obs);this.obstacles.remove(obs,true,true);}
    }

    for(let i=this.laserList.length-1;i>=0;i--){
      const laser=this.laserList[i];
      laser.x-=this.speed*dt;
      laser.t+=dt;
      if(laser.x<-40){laser.gfx.destroy();if(laser.txt)laser.txt.destroy();this.laserList.splice(i,1);continue;}
      const cycle=laser.t%laser.totalPeriod;
      const phaseStr=cycle<laser.warnDur?'warn':cycle<laser.warnDur+laser.onDur?'on':'off';
      // Play charge sound when transitioning OFF → WARN
      if(phaseStr==='warn'&&laser._lastPhase==='off') AUDIO.laserCharge();
      laser._lastPhase=phaseStr;
      // DANGER text: flash above laser during warn phase
      if(laser.txt){
        laser.txt.x=laser.x;
        if(phaseStr==='warn'){
          const flash=0.5+0.5*Math.sin((cycle/laser.warnDur)*Math.PI*8);
          laser.txt.setVisible(true).setAlpha(flash);
        } else {
          laser.txt.setVisible(false);
        }
      }
      // Periodic buzz during deadly phase
      if(phaseStr==='on'&&laser.x>0&&laser.x<W){
        laser._buzzTimer=(laser._buzzTimer||0)-dt;
        if(laser._buzzTimer<=0){laser._buzzTimer=0.22;AUDIO.laserBuzz();}
      }
      this._drawLaser(laser,phaseStr);
      if(phaseStr==='on'&&Math.abs(this.player.x-laser.x)<10){
        const gapH=Math.floor((TUNNEL_BOTTOM-TUNNEL_TOP)*0.35);
        const beamTop=laser.gapTop?(TUNNEL_TOP+gapH):TUNNEL_TOP;
        const beamBot=laser.gapTop?TUNNEL_BOTTOM:(TUNNEL_BOTTOM-gapH);
        if(this.player.y>=beamTop-4&&this.player.y<=beamBot+4){this._die();return;}
      }
      // Spark particles along beam
      if(laser.x>0&&laser.x<W){
        const rate=phaseStr==='on'?22:phaseStr==='warn'?7:0;
        if(rate>0&&Math.random()<dt*rate){
          const p=this._poolParticle();
          if(p){p.setActive(true).setVisible(true);p.x=laser.x+(Math.random()-0.5)*8;p.y=Phaser.Math.Between(TUNNEL_TOP+4,TUNNEL_BOTTOM-4);p.vx=(Math.random()-0.5)*150;p.vy=(Math.random()-0.5)*90;p.life=phaseStr==='on'?0.28:0.45;p.setTint(phaseStr==='on'?0xffffff:0xff4400);p.setScale(1);}
        }
      }
    }

    for(let i=this.gateList.length-1;i>=0;i--){
      const gate=this.gateList[i];
      gate.x-=this.speed*dt;
      if(gate.x<-50){gate.gfx.destroy();this.gateList.splice(i,1);continue;}
      // Ripple animation update
      if(gate.rippleR!==undefined){
        gate.rippleR+=210*dt;
        gate.rippleA=Math.max(0,1-gate.rippleR/72);
      }
      this._drawGate(gate,time);
      // Trigger: player crosses gate x-position (only once)
      if(!gate.triggered&&this.player.x>=gate.x-6&&this.player.x<=gate.x+10){
        gate.triggered=true; gate.rippleR=4; gate.rippleA=1.0;
        // Force gravity flip
        this.gravDir*=-1;
        this.vy=lerp(this.vy,this.gravDir*-FLIP_KICK,0.52);
        this.cameras.main.flash(60,0,255,120,false);
        this._floatText(gate.x,this.player.y-28,'\u26a1 GRAVITY FLIP!','#00ff88');
        AUDIO.gravGate();
      }
    }

    // Power-up timer countdown
    if(this._powerup&&this._powerup.timer!==undefined){
      this._powerup.timer=Math.max(0,this._powerup.timer-dt);
      if(this._powerup.timer<=0){
        const expiredType=this._powerup.type;
        this._powerup=null;
        this._slowmoOverlay.setAlpha(0);
        const expiredLabels={shield:'SHIELD GONE',magnet:'MAGNET OFF',slowmo:'SLOW-MO ENDED',doublecoins:'2X ENDED'};
        this._floatText(80,55,expiredLabels[expiredType]||'POWER-UP ENDED','#888888');
        if(expiredType==='doublecoins'){this.doubleCoinsActive=false;const req=this.lvl.required;const met=this.coinsCollected>=req;this.coinTxt.setText(`\u25c6 ${this.coinsCollected}/${req}`).setColor(met?'#00ff88':'#ffdd00');}
      }
    }
    // Slowmo: subtle blue overlay (no camera tint — would freeze rendering and block HTML buttons)
    if(this._powerup?.type==='slowmo'){
      this._slowmoOverlay.clear();
      this._slowmoOverlay.fillStyle(0x2266aa,0.13);
      this._slowmoOverlay.fillRect(0,TUNNEL_TOP,W,TUNNEL_BOTTOM-TUNNEL_TOP);
      this._slowmoOverlay.setAlpha(1);
    } else {
      this._slowmoOverlay.setAlpha(0);
    }
    // Magnet: pull nearby coins toward player
    if(this._powerup?.type==='magnet'){
      for(const c of this.coins.getChildren()){
        const dx=this.player.x-c.x,dy=this.player.y-c.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<180&&dist>1){const f=Math.min(320,9500/dist);c.x+=dx/dist*f*dt;c.y+=dy/dist*f*dt;}
      }
    }
    for(const c of this.coins.getChildren().slice()){
      c.x-=this.speed*dt;
      if(Phaser.Math.Distance.Between(this.player.x,this.player.y,c.x,c.y)<(c.isPowerup?28:22))this._collectCoin(c);
      if(c.x<-30)this.coins.remove(c,true,true);
    }

    // Scheduled obstacle spawn: pre-computed evenly distributed positions (20%–85%)
    if(this._obstacleScheduleIdx<this._obstacleSchedule.length){
      const wx=this._obstacleSchedule[this._obstacleScheduleIdx];
      if(this.distTraveled+(W-PLAYER_X)+100>=wx){
        this._spawnCluster(wx);
        this._obstacleScheduleIdx++;
      }
    }
    // Scheduled coin: midpoint between consecutive obstacles
    if(this._coinScheduleIdx<this._coinSchedule.length){
      const cwx=this._coinSchedule[this._coinScheduleIdx];
      if(this._w2s(cwx)<=W+80){
        this._placeZoneCoin(cwx);
        this._coinScheduleIdx++;
      }
    }
    // Heart pickup spawn (levels 5+, once per level)
    if(this._heartPickupWX>0&&!this._heartPickupSpawned&&this._w2s(this._heartPickupWX)<=W+60){
      this._heartPickupSpawned=true;
      this._spawnHeartPickup(this._heartPickupWX);
    }
    // Lava cave rising lava + falling rocks
    if(this._lavaGfx&&this.gameStarted){
      if(this._updateLavaMechanics(dt,time))return;
    }
    // Lava fireballs
    if(this.theme.style==='lava'){
      this._fireballTimer-=dt;
      if(this._fireballTimer<=0){
        this._fireballTimer=1.8+Math.random()*2.2;
        const wb=this.distTraveled+(W-PLAYER_X)+Phaser.Math.Between(80,240);
        const fb=this.add.image(this._w2s(wb),TUNNEL_TOP+6,'fireball').setDepth(8).setScale(1.4);
        fb.worldX=wb;fb.vy=20+Math.random()*40;
        this.fireballs.push(fb);
      }
    }
    for(let i=this.fireballs.length-1;i>=0;i--){
      const fb=this.fireballs[i];
      fb.vy+=200*dt;
      fb.y+=fb.vy*dt;
      fb.x=this._w2s(fb.worldX);
      fb.setRotation(fb.vy*0.008);
      if(fb.y>TUNNEL_BOTTOM+20||fb.x<-24){fb.destroy();this.fireballs.splice(i,1);continue;}
      const dx=this.player.x-fb.x,dy=this.player.y-fb.y;
      if(Math.sqrt(dx*dx+dy*dy)<16){this._die();return;}
    }

    this.particles.getChildren().forEach(p=>{
      if(!p.active)return;
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.91;p.vy*=0.91;
      p.life-=dt*2.5;p.setAlpha(Math.max(0,p.life));
      if(p.life<=0)p.setActive(false).setVisible(false);
    });

    if(this.cameraShake>0){
      this.cameraShake-=dt*2.2;
      const mag=this.cameraShake*6;
      this.cameras.main.setScroll((Math.random()-0.5)*mag,(Math.random()-0.5)*mag);
    } else this.cameras.main.setScroll(0,0);

    // Shockwave ring + directional arrow
    this.flipGfx.clear();
    if(this._shockwave){
      const sw=this._shockwave;
      sw.r+=185*dt;
      sw.alpha=Math.max(0,(1-sw.r/sw.maxR)*0.88);
      if(sw.alpha<=0){this._shockwave=null;}
      else {
        this.flipGfx.lineStyle(3,sw.color,sw.alpha);
        this.flipGfx.strokeCircle(sw.x,sw.y,sw.r);
        this.flipGfx.lineStyle(10,sw.color,sw.alpha*0.20);
        this.flipGfx.strokeCircle(sw.x,sw.y,sw.r);
        // Directional arrow tip in the direction of new gravity
        const tipY=sw.y+sw.dir*sw.r;
        const baseY=sw.y+sw.dir*(sw.r-14);
        this.flipGfx.fillStyle(0xffffff,sw.alpha*0.85);
        this.flipGfx.fillTriangle(sw.x-8,baseY,sw.x+8,baseY,sw.x,tipY);
      }
    }

    // Active power-up aura around player
    this.shieldAura.clear();
    const pu=this._powerup;
    if(pu?.type==='shield'){
      const a=0.7+Math.sin(time*0.009)*0.3;
      // Outer halo
      this.shieldAura.lineStyle(22,0x00ff44,0.10+Math.sin(time*0.006)*0.05);this.shieldAura.strokeCircle(this.player.x,this.player.y,42);
      // Middle glow
      this.shieldAura.lineStyle(11,0x00ff88,a*0.42);this.shieldAura.strokeCircle(this.player.x,this.player.y,33);
      // Core bright ring — always fully opaque
      this.shieldAura.lineStyle(3,0x44ffbb,1.0);this.shieldAura.strokeCircle(this.player.x,this.player.y,29);
      // Inner tight ring
      this.shieldAura.lineStyle(2,0xaaffdd,a);this.shieldAura.strokeCircle(this.player.x,this.player.y,24);
    } else if(pu?.type==='magnet'){
      const a=0.30+Math.sin(time*0.012)*0.18;
      this.shieldAura.lineStyle(2,0xffdd00,a);this.shieldAura.strokeCircle(this.player.x,this.player.y,40+Math.sin(time*0.008)*5);
      this.shieldAura.lineStyle(2,0xffaa00,a*0.55);this.shieldAura.strokeCircle(this.player.x,this.player.y,60+Math.sin(time*0.012)*7);
    } else if(pu?.type==='slowmo'){
      const a=0.22+Math.sin(time*0.006)*0.14;
      this.shieldAura.lineStyle(3,0x88ddff,a);this.shieldAura.strokeCircle(this.player.x,this.player.y,32+Math.sin(time*0.005)*5);
    } else if(pu?.type==='doublecoins'){
      const a=0.28+Math.sin(time*0.010)*0.18;
      this.shieldAura.lineStyle(3,0xaa44ff,a);this.shieldAura.strokeCircle(this.player.x,this.player.y,28+Math.sin(time*0.009)*4);
    }
    // Power-up HUD bar
    this.powerupGfx.clear();
    if(pu){
      const cfg={
        shield:    {icon:'\u25c9 SHIELD',   bg:0x003322,bar:0x00ff88,warn:0xffff44},
        magnet:    {icon:'\u2726 MAGNET',   bg:0x332200,bar:0xffdd00,warn:0xffffff},
        slowmo:    {icon:'\u29d7 SLOW-MO',  bg:0x001a33,bar:0x44ccff,warn:0xffffff},
        doublecoins:{icon:'2\u00d7 COINS',  bg:0x1a0033,bar:0xaa44ff,warn:0xff88ff},
      }[pu.type]||{icon:'',bg:0x111111,bar:0xffffff,warn:0xffffff};
      this.powerupTxt.setText(cfg.icon);
      const pct=pu.type==='shield'?(pu.timer/pu.duration):clamp(pu.timer/pu.duration,0,1);
      const warn=pu.type!=='shield'&&pu.timer<2;
      const flash=warn?0.55+0.45*Math.sin(time*0.020):0.9;
      this.powerupGfx.fillStyle(cfg.bg,0.80);this.powerupGfx.fillRect(10,50,80,7);
      this.powerupGfx.fillStyle(warn?cfg.warn:cfg.bar,flash);this.powerupGfx.fillRect(10,50,Math.max(1,80*pct),7);
    } else {
      this.powerupTxt.setText('');
    }
    // Sky clouds: spawn + scroll semi-opaque cloud rectangles
    if(style==='sky'&&this.gameStarted){
      this._cloudTimer=(this._cloudTimer||0)-dt;
      if(this._cloudTimer<=0){
        this._cloudTimer=5+Math.random()*6;
        const cw=Phaser.Math.Between(110,200),ch=Phaser.Math.Between(38,72);
        const cy=Phaser.Math.Between(TUNNEL_TOP+8,TUNNEL_BOTTOM-ch-8);
        const cwx=this.distTraveled+(W-PLAYER_X)+Phaser.Math.Between(40,160);
        const cg=this.add.graphics().setDepth(18);
        cg.fillStyle(0xffffff,0.65);cg.fillRoundedRect(0,0,cw,ch,12);
        cg.x=this._w2s(cwx);cg.y=cy;
        this.cloudList.push({gfx:cg,worldX:cwx,y:cy});
      }
      for(let i=this.cloudList.length-1;i>=0;i--){
        const cl=this.cloudList[i];
        cl.gfx.x=this._w2s(cl.worldX);
        if(cl.gfx.x<-220){cl.gfx.destroy();this.cloudList.splice(i,1);}
      }
    }
    this._themeAmbient(dt,time);
    this._drawWalls(this.distTraveled,time);
    this._updateHUD(prog);
    this._updateFinishLine();
  }

  _drawLaser(laser,phaseStr){
    const g=laser.gfx; g.clear();
    if(laser.x<-20||laser.x>W+20)return;
    // Compute active beam zone (35% of tunnel height is safe gap)
    const gapH=Math.floor((TUNNEL_BOTTOM-TUNNEL_TOP)*0.35);
    const beamTop=laser.gapTop?(TUNNEL_TOP+gapH):TUNNEL_TOP;
    const beamBot=laser.gapTop?TUNNEL_BOTTOM:(TUNNEL_BOTTOM-gapH);
    const safeTop=laser.gapTop?TUNNEL_TOP:(TUNNEL_BOTTOM-gapH);
    const safeBot=laser.gapTop?(TUNNEL_TOP+gapH):TUNNEL_BOTTOM;
    if(phaseStr==='on'){
      // Deadly phase: pure DANGER RED — only in beam zone
      const t2=laser.t;
      const flicker=0.82+0.18*Math.sin(t2*52);
      g.lineStyle(50,0xff0000,0.07*flicker);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.lineStyle(28,0xff0000,0.20*flicker);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.lineStyle(14,0xff3300,0.48*flicker);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.lineStyle(7,0xff0000,flicker);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.lineStyle(2,0xffffff,0.95*flicker);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.fillStyle(0xff0000,flicker);g.fillCircle(laser.x,beamTop,10);g.fillCircle(laser.x,beamBot,10);
      g.fillStyle(0xffffff,0.95);g.fillCircle(laser.x,beamTop,5);g.fillCircle(laser.x,beamBot,5);
      // Green safe-zone indicator
      g.lineStyle(3,0x00ff88,0.35);g.beginPath();g.moveTo(laser.x,safeTop+4);g.lineTo(laser.x,safeBot-4);g.strokePath();
    } else if(phaseStr==='warn'){
      const warnPct=Math.min(1,(laser.t%laser.totalPeriod)/laser.warnDur);
      const pulse=0.35+0.45*Math.sin(warnPct*Math.PI*7);
      g.lineStyle(2,0xff6600,pulse);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.lineStyle(10,0xff4400,pulse*0.14);g.beginPath();g.moveTo(laser.x,beamTop);g.lineTo(laser.x,beamBot);g.strokePath();
      g.fillStyle(0xff6600,pulse);g.fillCircle(laser.x,beamTop,4);g.fillCircle(laser.x,beamBot,4);
      // Safe zone green glow (guides the player)
      g.lineStyle(8,0x00ff88,pulse*0.45);g.beginPath();g.moveTo(laser.x,safeTop+4);g.lineTo(laser.x,safeBot-4);g.strokePath();
      g.fillStyle(0x00ff88,pulse*0.30);g.fillRect(laser.x-20,safeTop,40,safeBot-safeTop);
    }
    // off phase: invisible
  }

  _doGravityGate(sx,wx){
    this._lastGateWorldX=wx;
    const gfx=this.add.graphics().setDepth(7);
    this.gateList.push({gfx,x:sx,triggered:false,rippleR:undefined,rippleA:0});
  }

  _drawGate(gate,time){
    const g=gate.gfx; g.clear();
    if(gate.x<-20||gate.x>W+20)return;
    if(!gate.triggered){
      // Animated vertical line: green→yellow gradient shimmer
      const pulse=0.55+0.35*Math.sin(time*0.006);
      g.lineStyle(3,0x00ff88,pulse);
      g.beginPath();g.moveTo(gate.x,TUNNEL_TOP);g.lineTo(gate.x,TUNNEL_BOTTOM);g.strokePath();
      g.lineStyle(14,0x00ff44,pulse*0.15);
      g.beginPath();g.moveTo(gate.x,TUNNEL_TOP);g.lineTo(gate.x,TUNNEL_BOTTOM);g.strokePath();
      // Chevron arrows pointing inward — indicates flip incoming
      const ay=H/2, aw=10, ah=14;
      g.fillStyle(0x00ffaa,pulse*0.9);
      g.fillTriangle(gate.x-aw,ay-ah,gate.x,ay,gate.x-aw,ay+ah);
      g.fillTriangle(gate.x+aw,ay-ah,gate.x,ay,gate.x+aw,ay+ah);
      // End caps
      g.fillStyle(0x00ff88,pulse);g.fillCircle(gate.x,TUNNEL_TOP,5);g.fillCircle(gate.x,TUNNEL_BOTTOM,5);
    } else if(gate.rippleA>0){
      // Ripple ring after trigger
      g.lineStyle(3,0x00ff88,gate.rippleA);
      g.strokeCircle(gate.x,H/2,gate.rippleR);
      g.lineStyle(10,0x00ff44,gate.rippleA*0.20);
      g.strokeCircle(gate.x,H/2,gate.rippleR);
    }
  }

  _collectCoin(c){
    if(c.isHeart){
      if(this._hearts<this._maxHearts){
        this._hearts++;
        this._updateHeartsHUD();
        this._floatText(c.x,c.y-24,'\u2665 +1 LIFE','#ff4444');
        this._emitParticles(c.x,c.y,[0xff4444,0xff8888,0xffffff],18,80,160);
        AUDIO.heartGet();
      } else {
        this._floatText(c.x,c.y-24,'FULL HP','#ff8888');
      }
      this.coins.remove(c,true,true);return;
    }
    if(c.isPowerup){
      this._activatePowerup(c.powerupType);
      this._floatText(c.x,c.y-24,c.powerupType.toUpperCase()+'!','#00ff88');
      this._emitParticles(c.x,c.y,[0x00ff88,0x88ffcc,0xffffff],14,80,170);
      this.coins.remove(c,true,true); return;
    }
    const double=this.doubleCoinsActive;
    const basePts=c.isRare?500:100;
    const pts=double?basePts*2:basePts;
    const inc=double?2:1;
    this.coinsCollected+=inc; this.levelScore+=pts;
    if(c.isRare)this._rareCoins++;
    const req=this.lvl.required,met=this.coinsCollected>=req;
    const badge=double?' 2\u00d7':'';
    this.coinTxt.setText(`\u25c6 ${this.coinsCollected}/${req}${badge}`).setColor(met?'#00ff88':double?'#cc88ff':'#ffdd00');
    const pColor=double?[0xaa44ff,0xdd88ff,0xffffff]:c.isRare?[0x9933ff,0xcc88ff,0xffffff]:[0xffdd00,0xffee66,0xffffff];
    this._emitParticles(c.x,c.y,pColor,c.isRare||double?24:14,80,170);
    this.tweens.add({targets:this.coinTxt,scaleX:1.7,scaleY:1.7,duration:90,yoyo:true,ease:'Back.easeOut'});
    if(met&&this.coinsCollected-inc<req){this.cameras.main.flash(120,0,255,100,false);this.unlockedMsg.setAlpha(1);}
    this._floatText(c.x,c.y-20,c.isRare?'+5':double?'+2':'+1',c.isRare?'#cc88ff':double?'#aa44ff':'#ffdd00');
    if(c.isRare)AUDIO.coinRare();else AUDIO.coin();
    this.coins.remove(c,true,true);
  }

  _aabb(a,b){
    // Player hitbox ≈28% of sprite; obstacles 55% + 3px padding for edge registration
    const aw=a.displayWidth*0.28,ah=a.displayHeight*0.28;
    const bw=b.displayWidth*0.55+3,bh=b.displayHeight*0.55+3;
    return Math.abs(a.x-b.x)<(aw+bw)/2&&Math.abs(a.y-b.y)<(ah+bh)/2;
  }

  // Near-miss zone: player graphic size (~50%) vs obstacle wider collision zone (~70%)
  _nearMissCheck(a,b){
    const aw=a.displayWidth*0.50,ah=a.displayHeight*0.50,bw=b.displayWidth*0.70,bh=b.displayHeight*0.70;
    return Math.abs(a.x-b.x)<(aw+bw)/2&&Math.abs(a.y-b.y)<(ah+bh)/2;
  }

  _triggerNearMiss(obs){
    // Flash obstacle red
    const origTint=obs.obstacleType==='spike'?this.theme.spikeTint:this.theme.blockTint;
    obs.setTint(0xff2222);
    this.time.delayedCall(160,()=>{if(obs.scene)obs.setTint(origTint);});
    // Sparks at nearest point on obstacle surface
    const nx=clamp(this.player.x,obs.x-obs.displayWidth*0.5,obs.x+obs.displayWidth*0.5);
    const ny=clamp(this.player.y,obs.y-obs.displayHeight*0.5,obs.y+obs.displayHeight*0.5);
    this._emitParticles(nx,ny,[0xff3333,0xff8800,0xffdd44,0xffffff],10,35,120);
    // Light shake (softer than death)
    this.cameraShake=Math.max(this.cameraShake,0.038);
    // Screen tint flash
    this.cameras.main.flash(55,255,60,0,false);
    // "CLOSE CALL!" text — rate-limited so it doesn't spam
    if(this._closeCallCooldown<=0){
      this._floatText(this.player.x,this.player.y-40,'CLOSE CALL!','#ff5555');
      this._closeCallCooldown=1.4;
    }
    AUDIO.nearMiss();
  }

  _floatText(x,y,txt,color='#ffdd00'){
    const t=this.add.text(x,y,txt,{fontFamily:'"Press Start 2P"',fontSize:'10px',color,shadow:{x:1,y:1,color:'#000000',blur:0,fill:true}}).setOrigin(0.5).setDepth(25);
    this.tweens.add({targets:t,y:y-48,alpha:0,duration:780,ease:'Power2',onComplete:()=>t.destroy()});
  }

  _activatePowerup(type){
    const dur={shield:15,magnet:6,slowmo:5,doublecoins:8}[type]||5;
    this._powerup={type,timer:dur,duration:dur};
    if(type==='shield')AUDIO.shieldGet();
    else if(type==='magnet')AUDIO.magnetGet();
    else if(type==='slowmo')AUDIO.slowmoGet();
    else if(type==='doublecoins'){
      this.doubleCoinsActive=true;
      console.log('[GravityFlipper] doubleCoinsActive = true (8s)');
      AUDIO.doubleCoinsGet();
      const req=this.lvl.required;const met=this.coinsCollected>=req;
      this.coinTxt.setText(`\u25c6 ${this.coinsCollected}/${req} 2\u00d7`).setColor(met?'#00ff88':'#cc88ff');
    }
  }

  _updateHUD(prog){
    const g=this.progGfx;g.clear();
    const bw=(W-20)*clamp(prog,0,1);
    if(bw>1){g.fillStyle(this.theme.wallLine,0.5);g.fillRect(10,TUNNEL_TOP+3,bw,4);g.fillStyle(0xffffff,0.2);g.fillRect(10,TUNNEL_TOP+3,bw,1);}
    g.fillStyle(0xffff00,0.9);g.fillRect(W-14,TUNNEL_TOP+2,6,6);
  }

  _checkDailyChallenges(coins,flips,finished){
    const daily=getDailyChallenges();let bonus=0;
    daily.challenges.forEach(c=>{
      if(c.done)return;
      let met=false;
      if(c.type==='coins'&&coins>=c.goal)met=true;
      else if(c.type==='flips'&&finished&&flips<=c.goal)met=true;
      else if(c.type==='finish'&&finished)met=true;
      else if(c.type==='level'&&this.levelIndex+1>=c.goal)met=true;
      else if(c.type==='score'&&this.levelScore>=c.goal)met=true;
      else if(c.type==='rare'&&this._rareCoins>=c.goal)met=true;
      if(met){c.done=true;bonus+=c.bonus;}
    });
    if(bonus>0){
      saveDailyChallenges(daily);
      this.totalScore+=bonus;
      this._floatText(W/2,H/2-70,`\u2605 DAILY! +${bonus}pts`,'#ffaa00');
      this.cameras.main.flash(220,255,170,0,false);
    }
  }

  _completeLEVEL(){
    if(this.levelDone||!this.alive)return;
    this.levelDone=true;this.alive=false;
    this.cameras.main.setAngle(0);
    this.cloudList.forEach(cl=>{try{cl.gfx.destroy();}catch(e){}});this.cloudList=[];
    this.gateList.forEach(gl=>{try{gl.gfx.destroy();}catch(e){}});this.gateList=[];
    this.laserList.forEach(ll=>{try{ll.gfx.destroy();}catch(e){}try{if(ll.txt)ll.txt.destroy();}catch(e){}});this.laserList=[];
    const passed=this.coinsCollected>=this.lvl.required;
    this._checkDailyChallenges(this.coinsCollected,this._levelFlips,passed);
    if(passed){
      AUDIO.complete();
      // ── TURBO FINISH ──────────────────────────────────────────────
      this.cameras.main.flash(220,255,255,180,false);
      this.cameras.main.shake(380,0.022);
      // Brief zoom-out then snap back
      this.tweens.add({targets:this.cameras.main,zoom:0.88,duration:280,ease:'Power2',yoyo:true,hold:100});
      // Speed burst trail: rapid particle jets from player position
      const themeColors=[this.theme.wallLine,this.theme.wallGlow||0xffffff,0xffffff];
      for(let i=0;i<8;i++){
        this.time.delayedCall(i*55,()=>{
          this._emitParticles(this.player.x,this.player.y,themeColors,18,140,340);
        });
      }
      // Scattered explosions across the tunnel
      for(let i=0;i<6;i++) this.time.delayedCall(i*110,()=>this._emitParticles(Phaser.Math.Between(40,W-40),Phaser.Math.Between(TUNNEL_TOP+20,TUNNEL_BOTTOM-20),[0xffdd00,0x00ffcc,0xff44ff,0xffffff,0x00ffff],20,100,260));
      const fs=this.totalScore+this.levelScore;
      const best=parseInt(localStorage.getItem('gf_best')||'0');
      if(fs>best)localStorage.setItem('gf_best',fs);
      const bLvl=parseInt(localStorage.getItem('gf_level')||'1');
      if(this.levelIndex+1>bLvl)localStorage.setItem('gf_level',this.levelIndex+1);
      this.time.delayedCall(1000,()=>{AUDIO.stopMusic();this.scene.start('LevelComplete',{levelIndex:this.levelIndex,coinsCollected:this.coinsCollected,totalCoins:this.lvl.coins,requiredCoins:this.lvl.required,levelScore:this.levelScore,totalScore:fs,isLastLevel:this.levelIndex>=LEVELS.length-1});});
    } else {
      AUDIO.failed();
      this.cameras.main.flash(250,255,80,0,false);
      this.player.setVisible(false);this.trail.forEach(t=>t.setVisible(false));
      this.time.delayedCall(700,()=>{AUDIO.stopMusic();this.scene.start('LevelFailed',{levelIndex:this.levelIndex,coinsCollected:this.coinsCollected,requiredCoins:this.lvl.required,levelScore:this.levelScore,totalScore:this.totalScore});});
    }
  }

  _updateLavaMechanics(dt,time){
    const g=this._lavaGfx; g.clear();
    const lw=this._lavaWave;
    lw.timer-=dt;
    switch(lw.phase){
      case 'idle':
        if(lw.timer<=0){lw.phase='warn';lw.timer=2.0;this._floatText(W/2,TUNNEL_BOTTOM-50,'\u26a0 LAVA SURGE!','#ff4400');}
        break;
      case 'warn':
        {const p=0.4+0.4*Math.sin(time*0.025);
        g.fillStyle(0xff4400,p*0.5);g.fillRect(0,TUNNEL_BOTTOM-28,W,28);
        this.cameraShake=Math.max(this.cameraShake,0.006*p);}
        if(lw.timer<=0){lw.phase='rising';lw.timer=0.5;}
        break;
      case 'rising':
        lw.height=Math.max(0,(1-(lw.timer/0.5))*170);
        if(lw.timer<=0){lw.phase='peak';lw.timer=1.5;lw.height=170;}
        break;
      case 'peak':
        if(lw.timer<=0){lw.phase='receding';lw.timer=0.5;}
        break;
      case 'receding':
        lw.height=Math.max(0,(lw.timer/0.5)*170);
        if(lw.timer<=0){lw.phase='idle';lw.timer=9+Math.random()*5;lw.height=0;}
        break;
    }
    if(lw.height>0){
      const lavaTop=TUNNEL_BOTTOM-lw.height;
      g.fillStyle(0xff3300,0.92);g.fillRect(0,lavaTop,W,lw.height);
      // Wavy bright surface
      for(let x=0;x<W;x+=10){g.fillStyle(0xff8800,0.75);g.fillRect(x,lavaTop+Math.sin(time*0.006+x*0.05)*3,7,4);}
      g.fillStyle(0xffcc00,0.55);g.fillRect(0,lavaTop,W,3);
      // Kill check
      const ph2=this.player.displayHeight/2;
      if(this.player.y+ph2>lavaTop-2){this._die();if(!this.alive)return true;}
    }
    // Falling rocks
    this._rockTimer-=dt;
    if(this._rockTimer<=0){
      this._rockTimer=5+Math.random()*5;
      this._rocks.push({x:Phaser.Math.Between(50,W-50),phase:'shadow',timer:1.5,y:TUNNEL_TOP+10,vy:0});
    }
    for(let i=this._rocks.length-1;i>=0;i--){
      const rock=this._rocks[i];
      rock.timer-=dt;
      if(rock.phase==='shadow'){
        const p=0.3+0.4*Math.sin(time*0.02);
        g.fillStyle(0x441100,p*0.65);g.fillCircle(rock.x,TUNNEL_BOTTOM-10,20);
        g.fillStyle(0xff4400,p*0.25);g.fillCircle(rock.x,TUNNEL_BOTTOM-10,30);
        // Arrow warning above
        g.fillStyle(0xff8800,p*0.8);g.fillTriangle(rock.x-7,TUNNEL_TOP+28,rock.x+7,TUNNEL_TOP+28,rock.x,TUNNEL_TOP+10);
        if(rock.timer<=0){rock.phase='falling';rock.y=TUNNEL_TOP+12;rock.vy=180;}
      } else if(rock.phase==='falling'){
        rock.vy=Math.min(rock.vy+1400*dt,950);rock.y+=rock.vy*dt;
        g.fillStyle(0x553300,1);g.fillCircle(rock.x,rock.y,13);
        g.fillStyle(0x774422,1);g.fillCircle(rock.x-3,rock.y-3,5);
        g.fillStyle(0x221100,0.55);g.fillCircle(rock.x+4,rock.y+4,4);
        if(rock.y>=TUNNEL_BOTTOM-14){rock.phase='landed';rock.timer=1.0;rock.y=TUNNEL_BOTTOM-14;}
        const dx=this.player.x-rock.x,dy=this.player.y-rock.y;
        if(Math.sqrt(dx*dx+dy*dy)<20){this._die();if(!this.alive)return true;}
      } else if(rock.phase==='landed'){
        g.fillStyle(0x553300,1);g.fillCircle(rock.x,rock.y,13);
        const dx=this.player.x-rock.x,dy=this.player.y-rock.y;
        if(Math.sqrt(dx*dx+dy*dy)<20){this._die();if(!this.alive)return true;}
        if(rock.timer<=0)this._rocks.splice(i,1);
      }
    }
    return false;
  }
  _updateHeartsHUD(){
    if(this.heartsTxt)this.heartsTxt.setText('\u2665'.repeat(this._hearts));
  }
  _spawnHeartPickup(wx){
    const sx=this._w2s(wx);
    const c=this.add.image(sx,H/2,'heart_pickup').setDepth(7).setScale(2.4);
    c.bobOffset=Math.random()*Math.PI*2;c.worldX=wx;
    c.isRare=false;c.isPowerup=false;c.powerupType=null;c.isHeart=true;
    this.coins.add(c);
  }
  _die(){
    if(!this.alive)return;
    if(this._invincible)return;
    if(this._powerup?.type==='shield'){
      this._powerup=null;
      AUDIO.shieldHit();
      this.cameras.main.shake(220,0.015);
      this.cameras.main.flash(80,0,255,150,false);
      // Shattered glass burst
      this._emitParticles(this.player.x,this.player.y,[0x00ff88,0x88ffcc,0xaaffcc,0xffffff],28,80,260);
      this._floatText(this.player.x,this.player.y-40,'SHIELD SHATTERED!','#00ff88');
      this.flipCooldown=0.3; return; // absorb hit!
    }
    // Extra heart: absorb hit with brief invincibility
    if(this._hearts>1){
      this._hearts--;
      this._invincible=true; this._invincibleTimer=2.0;
      this.cameras.main.shake(180,0.012);
      this.cameras.main.flash(80,255,80,80,false);
      this._emitParticles(this.player.x,this.player.y,[0xff4444,0xff8888,0xffffff],18,60,150);
      this._floatText(W/2,H/2-40,'CLOSE CALL!','#ff4444');
      this._updateHeartsHUD();
      return;
    }
    this.alive=false;AUDIO.death();
    this.cameras.main.shake(480,0.022);
    this.cameras.main.flash(60,255,255,255,false);
    this.time.delayedCall(60,()=>this.cameras.main.flash(200,255,40,40,false));
    for(let i=0;i<44;i++){
      const p=this.add.image(this.player.x,this.player.y,'particle').setDepth(20).setScale(Phaser.Math.Between(1,5));
      const a=Math.random()*Math.PI*2,s=Phaser.Math.Between(80,320);
      p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=1;
      p.setTint([0xff3300,0xffee00,0xff8800,0xffffff][Math.floor(Math.random()*4)]);
      this.tweens.add({targets:p,alpha:0,scale:0,duration:600+Math.random()*500,onComplete:()=>p.destroy()});
    }
    this.player.setVisible(false);this.trail.forEach(t=>t.setVisible(false));
    this.fireballs.forEach(fb=>{try{fb.destroy();}catch(e){}});this.fireballs=[];
    this.cloudList.forEach(cl=>{try{cl.gfx.destroy();}catch(e){}});this.cloudList=[];
    this.gateList.forEach(gl=>{try{gl.gfx.destroy();}catch(e){}});this.gateList=[];
    this.laserList.forEach(ll=>{try{ll.gfx.destroy();}catch(e){}try{if(ll.txt)ll.txt.destroy();}catch(e){}});this.laserList=[];
    this.cameras.main.setAngle(0);
    const fs=this.totalScore+this.levelScore;
    const best=parseInt(localStorage.getItem('gf_best')||'0');
    if(fs>best)localStorage.setItem('gf_best',fs);
    this.time.delayedCall(1000,()=>{AUDIO.stopMusic();this.scene.start('Death',{levelIndex:this.levelIndex,score:fs,prevScore:this.totalScore,coinsCollected:this.coinsCollected});});
  }
}

    const best=parseInt(localStorage.getItem('gf_best')||'0');
